<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Personal — RRHH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===================== TOKENS ===================== */
:root{
  --navy:#1E3A5F;
  --navy-soft:#2D4F7C;
  --paper:#F4F7FA;
  --paper-dim:#E9EFF5;
  --line:#D6E0EA;
  --steel:#2F6690;
  --steel-soft:#E1EDF6;
  --umber:#5B6B8C;
  --umber-soft:#EAEDF5;
  --amber:#3B82C4;
  --amber-soft:#E3F0FB;
  --brick:#C0524A;
  --brick-soft:#FAEAE8;
  --sage:#3F8A6E;
  --sage-soft:#E5F3ED;
  --vacation:#C9952E;
  --vacation-soft:#FBF1DE;
  --ink:#23344A;
  --ink-dim:#6B7E94;
  --white:#FFFFFF;

  --f-display:'Archivo',sans-serif;
  --f-body:'IBM Plex Sans',sans-serif;
  --f-mono:'IBM Plex Mono',monospace;

  --radius:8px;
  --shadow-card:0 1px 2px rgba(30,58,95,.05), 0 4px 14px rgba(30,58,95,.07);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:var(--f-body);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}
::selection{background:var(--amber-soft);}

/* visible keyboard focus */
button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, [tabindex]:focus-visible{
  outline:2px solid var(--steel);
  outline-offset:2px;
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
}

/* ===================== SHELL ===================== */
.app-shell{
  display:flex;
  height:100vh;
  width:100vw;
  overflow:hidden;
}

/* ---- Sidebar rail ---- */
.rail{
  width:84px;
  flex:0 0 84px;
  background:var(--paper-dim);
  border-right:1px solid var(--line);
  box-shadow:2px 0 10px rgba(30,58,95,.04);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:18px 0 14px;
  position:relative;
  z-index:5;
}
.rail-tabs{
  display:flex;
  flex-direction:column;
  gap:4px;
  width:100%;
  align-items:center;
  flex:1;
}
.rail-tab{
  width:68px;
  background:none;
  border:none;
  color:var(--ink-dim);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  padding:11px 4px;
  border-radius:var(--radius);
  font-size:10.5px;
  font-weight:600;
  line-height:1.25;
  text-align:center;
  letter-spacing:.01em;
  transition:background .15s, color .15s;
}
.rail-tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7;}
.rail-tab:hover{background:var(--steel-soft);color:var(--steel);}
.rail-tab.active{
  background:var(--navy);
  color:var(--white);
  box-shadow:0 2px 8px rgba(30,58,95,.25);
}
.rail-tab.active svg{stroke:var(--white);}
.rail-foot{
  color:var(--ink-dim);
  opacity:.5;
  font-size:9px;
  letter-spacing:.06em;
  margin-top:10px;
}

/* ---- Main area ---- */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  min-width:0;
}
.topbar{
  height:60px;
  flex:0 0 60px;
  background:var(--white);
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
}
.topbar h1{
  font-family:var(--f-display);
  font-weight:700;
  font-size:18px;
  margin:0;
  letter-spacing:-.01em;
}
.topbar .sub{
  font-size:12px;
  color:var(--ink-dim);
  margin-top:1px;
}
.topbar-date{
  font-family:var(--f-display);
  font-size:13.5px;
  font-weight:600;
  letter-spacing:.01em;
  color:var(--navy);
  background:var(--amber-soft);
  border:1px solid #CFE3F5;
  padding:7px 16px;
  border-radius:20px;
}

.view{
  flex:1;
  overflow:auto;
  padding:24px 28px 40px;
}
.view-hidden{display:none !important;}

/* ===================== SHARED UI ===================== */
.panel{
  background:var(--white);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow-card);
}
.panel-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px;
  border-bottom:1px solid var(--line);
}
.panel-head h2{
  font-family:var(--f-display);
  font-size:13.5px;
  font-weight:700;
  letter-spacing:.04em;
  text-transform:uppercase;
  color:var(--navy);
  margin:0;
}
.panel-head .count{
  font-family:var(--f-mono);
  font-size:11.5px;
  color:var(--ink-dim);
}

.btn{
  border:1px solid var(--line);
  background:var(--white);
  border-radius:5px;
  padding:7px 13px;
  font-size:12.5px;
  font-weight:600;
  color:var(--navy);
  display:inline-flex;
  align-items:center;
  gap:6px;
  transition:background .12s, border-color .12s;
}
.btn:hover{background:var(--paper-dim);}
.btn-primary{
  background:var(--navy);
  border-color:var(--navy);
  color:var(--white);
}
.btn-primary:hover{background:var(--navy-soft);}
.btn-sm{padding:4px 9px;font-size:11.5px;}
.btn-icon{
  width:28px;height:28px;padding:0;
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:5px;border:1px solid var(--line);background:var(--white);
}
.btn-icon:hover{background:var(--paper-dim);}
.btn-icon svg{width:14px;height:14px;}
.btn-danger-ghost{color:var(--brick);border-color:var(--brick-soft);}
.btn-danger-ghost:hover{background:var(--brick-soft);}

.tag{
  display:inline-flex;
  align-items:center;
  font-size:10.5px;
  font-weight:600;
  padding:2px 8px;
  border-radius:20px;
  letter-spacing:.02em;
}
.tag-am{background:var(--steel-soft);color:var(--steel);}
.tag-pm{background:var(--umber-soft);color:var(--umber);}
.tag-coord{background:#EDE6F5;color:#6B4E96;}

input[type=text], input[type=date], input[type=number], input[type=email], textarea, select{
  border:1px solid var(--line);
  border-radius:5px;
  padding:7px 10px;
  font-size:12.5px;
  color:var(--ink);
  background:var(--white);
  width:100%;
}
textarea{resize:vertical;font-family:var(--f-body);}
input::placeholder, textarea::placeholder{color:#A8A296;}

.scroll-x{overflow-x:auto;}
.scroll-x::-webkit-scrollbar{height:10px;}
.scroll-x::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}
.scroll-x::-webkit-scrollbar-track{background:var(--paper-dim);}

.empty-state{
  padding:30px 18px;
  text-align:center;
  color:var(--ink-dim);
  font-size:12.5px;
}

/* toast */
.toast{
  position:fixed;
  bottom:22px;
  left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--navy);
  color:var(--white);
  font-size:12.5px;
  font-weight:500;
  padding:10px 18px;
  border-radius:6px;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  opacity:0;
  pointer-events:none;
  transition:opacity .18s, transform .18s;
  z-index:999;
  display:flex;
  align-items:center;
  gap:8px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast .dot{width:7px;height:7px;border-radius:50%;background:var(--sage);flex:0 0 7px;}

/* modal */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(28,34,48,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
  padding:20px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--white);
  border-radius:8px;
  width:100%;
  max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.modal-head{
  padding:16px 18px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.modal-head h3{margin:0;font-family:var(--f-display);font-size:14.5px;font-weight:700;}
.modal-body{padding:16px 18px;}
.modal-body p{font-size:12.5px;color:var(--ink-dim);margin:0 0 14px;line-height:1.5;}
.modal-foot{
  padding:14px 18px;
  border-top:1px solid var(--line);
  display:flex;
  justify-content:flex-end;
  gap:8px;
}
.field{margin-bottom:12px;}
.field label{
  display:block;
  font-size:11px;
  font-weight:600;
  color:var(--ink-dim);
  text-transform:uppercase;
  letter-spacing:.04em;
  margin-bottom:5px;
}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}

h1,h2,h3{font-family:var(--f-display);}

/* ===================== LOGIN ===================== */
#loginScreen{
  position:fixed; inset:0; background:var(--navy);
  display:flex; align-items:center; justify-content:center;
  z-index:200;
}
#loginScreen.hidden{display:none;}
.login-card{
  background:var(--paper); border-radius:10px; width:100%; max-width:340px;
  padding:32px 28px; box-shadow:0 24px 70px rgba(0,0,0,.4);
}
.login-brand{
  font-family:var(--f-display); font-weight:800; font-size:13px;
  letter-spacing:.1em; color:var(--amber); text-align:center; margin-bottom:4px;
}
.login-title{ text-align:center; font-size:14px; color:var(--ink-dim); margin-bottom:24px; }
.login-card .field{ margin-bottom:14px; }
.login-card label{ display:block; font-size:11px; font-weight:600; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.04em; margin-bottom:5px; }
.login-card input{ width:100%; padding:10px 12px; font-size:13.5px; }
#loginError{
  background:var(--brick-soft); color:var(--brick); font-size:12px; padding:8px 11px;
  border-radius:5px; margin-bottom:12px; display:none;
}
#loginError.show{ display:block; }
.login-card button[type=submit]{ width:100%; padding:10px; font-size:13px; margin-top:4px; }
.login-loading{ text-align:center; font-size:12px; color:var(--ink-dim); margin-top:10px; display:none; }
.login-loading.show{ display:block; }

/* indicador de sync / usuario en topbar */
.topbar-user{ display:flex; align-items:center; gap:14px; }
.topbar-user .who{ font-size:12px; color:var(--ink-dim); }
.topbar-user .who strong{ color:var(--ink); }
#btnLogout{ font-size:11.5px; padding:6px 11px; }
#syncStatus{ font-size:10.5px; color:var(--ink-dim); display:flex; align-items:center; gap:5px; }
#syncStatus .sync-dot{ width:6px; height:6px; border-radius:50%; background:var(--sage); }
#syncStatus.syncing .sync-dot{ background:var(--amber); }

.solo-lectura-banner{
  background:var(--umber-soft); color:var(--umber); border:1px solid #D5D9EC;
  border-radius:7px; padding:9px 14px; font-size:12px; font-weight:600;
  margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.solo-lectura-banner::before{ content:'🔒'; font-size:12px; }
</style>
</head>

<div class="toast" id="toast"><span class="dot"></span><span id="toastMsg"></span></div>

<!-- Firebase SDK (compat — funciona con <script> simple, sin npm/bundler) -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
/* =======================================================================
   data.js
   -----------------------------------------------------------------------
   Modelo de datos en memoria. Esta forma de objetos es la que se debería
   respetar 1 a 1 al migrar a Firestore:

   - DB.operadores   -> colección "operadores"      (doc id = operador.id)
   - DB.eventos      -> colección "eventos"          (doc id = evento.id)
   - DB.compensatorios -> colección "compensatorios" (doc id = comp.id)
   - DB.vacacionesCreditos -> colección "vacacionesCreditos" (doc id = credito.id)
   - DB.asistenciaHoy -> colección "asistencia" (doc id = `${operadorId}_${fecha}`)
   - DB.anotaciones   -> colección "anotaciones"     (doc id = anot.id)
   - DB.notasGenerales -> doc único "notasGenerales/actual"
   ======================================================================= */

/* =======================================================================
   firebase.js — conexión real a Firebase (Auth + Firestore)
   -----------------------------------------------------------------------
   DB sigue siendo el mismo objeto en memoria que usan las 5 vistas
   (DB.operadores, DB.eventos, etc.) — lo que cambia es que ahora se llena
   en vivo desde Firestore (onSnapshot) y, cada vez que Bus.emit() corre
   (ya disparado por las vistas tras cada cambio), se sincroniza de vuelta
   hacia las colecciones correspondientes.
   ======================================================================= */

const firebaseConfig = {
  apiKey: "AIzaSyDpxzMb0aJ0VjuDDuJpjto5hrq9UP-hJfM",
  authDomain: "asistente-rrhh-9f425.firebaseapp.com",
  projectId: "asistente-rrhh-9f425",
  storageBucket: "asistente-rrhh-9f425.firebasestorage.app",
  messagingSenderId: "844224699626",
  appId: "1:844224699626:web:6434fc06e4cdeb1bda8b93"
};

firebase.initializeApp(firebaseConfig);
const fbAuth = firebase.auth();
const fbDb = firebase.firestore();

/* Segunda instancia de Firebase, usada SOLO para crear usuarios nuevos.
   Por qué: createUserWithEmailAndPassword loguea automáticamente al usuario
   recién creado en la instancia donde se ejecuta. Si usáramos fbAuth (la
   instancia principal), crear un usuario nuevo deslogearía al admin actual.
   Con una segunda app aislada, el admin nunca pierde su sesión. */
const fbSecondaryApp = firebase.initializeApp(firebaseConfig, "secondary");
const fbAuthSecondary = fbSecondaryApp.auth();

/* Dominio falso para simular "usuario" en vez de email real.
   Tu compañero ingresa solo el nombre de usuario (ej: "admin") y
   acá se lo convierte en un email interno para Firebase Auth. */
const AUTH_EMAIL_DOMAIN = "rrhh.local";

const COLECCIONES = ["operadores", "eventos", "vacacionesCreditos", "compensatorios", "anotaciones"];

const DB = {
  operadores: [],
  sectores: ["Pruebas", "Estetica", "Guardado", "Ochava", "Coordinacion", "Informatica", "Movimientos", "Redes"],
  eventos: [],
  vacacionesCreditos: [],
  compensatorios: [],
  asistenciaHoy: {},
  operadoresEnAnotaciones: [],
  anotaciones: [],
  notasGenerales: "",
  historialOcultos: [], // ids de eventos que el usuario borró manualmente de la vista de Historial (el evento sigue en el calendario)
  usuarios: [], // { id (=uid de Firebase Auth), usuario, rol: 'admin'|'total'|'parcial' }
};

/* fecha "hoy" real del sistema (YYYY-MM-DD) */
function calcularHoy(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
const HOY = calcularHoy();

/* ---------------- snapshots: Firestore -> DB (lectura en vivo) ---------------- */
let _unsubscribers = [];
let _suppressNextSave = {}; // evita loops de re-guardado al recibir snapshot propio

function iniciarSincronizacion(){
  detenerSincronizacion();

  COLECCIONES.forEach(col=>{
    const unsub = fbDb.collection(col).onSnapshot(snap=>{
      DB[col] = snap.docs.map(d=> ({ id: d.id, ...d.data() }));
      Bus.render && Bus.render();
    }, err=>{
      console.error(`Error sincronizando ${col}:`, err);
      Toast.show(`Error de conexión leyendo "${col}"`);
    });
    _unsubscribers.push(unsub);
  });

  // documentos singleton: config (operadoresEnAnotaciones, notasGenerales, asistenciaHoy)
  const unsubConfig = fbDb.collection("config").doc("general").onSnapshot(doc=>{
    if(doc.exists){
      const data = doc.data();
      DB.operadoresEnAnotaciones = data.operadoresEnAnotaciones || [];
      DB.notasGenerales = data.notasGenerales || "";
      DB.asistenciaHoy = data.asistenciaHoy || {};
      DB.historialOcultos = data.historialOcultos || [];
    }
    Bus.render && Bus.render();
  }, err=>{
    console.error("Error sincronizando config:", err);
  });
  _unsubscribers.push(unsubConfig);

  // colección "usuarios" — independiente del guardado masivo genérico (ver guardarTodoEnFirestore).
  // Se gestiona con sus propias funciones (crearUsuario / borrarUsuario) para que ninguna otra
  // mutación de la app la toque por accidente.
  const unsubUsuarios = fbDb.collection("usuarios").onSnapshot(snap=>{
    DB.usuarios = snap.docs.map(d=> ({ id: d.id, ...d.data() }));
    actualizarRolActual();
    Bus.render && Bus.render();
  }, err=>{
    console.error("Error sincronizando usuarios:", err);
  });
  _unsubscribers.push(unsubUsuarios);
}

function detenerSincronizacion(){
  _unsubscribers.forEach(u=> u());
  _unsubscribers = [];
}

/* =======================================================================
   roles.js — sistema de permisos (admin / total / parcial)
   -----------------------------------------------------------------------
   RolActual se actualiza cada vez que cambia la sesión o llega un snapshot
   de la colección "usuarios". El usuario semilla (admin1, creado a mano en
   Firebase Auth) no tiene documento en "usuarios" — si no se encuentra
   coincidencia, se asume rol 'admin' (esto preserva tu acceso actual sin
   que tengas que crear tu propio documento manualmente).
   ======================================================================= */

let RolActual = 'admin';

function actualizarRolActual(){
  const user = fbAuth.currentUser;
  if(!user){ RolActual = 'admin'; return; }
  const emailUsuario = user.email.replace('@'+AUTH_EMAIL_DOMAIN, '');
  const registro = DB.usuarios.find(u=> u.usuario === emailUsuario);
  RolActual = registro ? registro.rol : 'admin';
}

function puedeEditar(vista){
  if(RolActual === 'admin' || RolActual === 'total') return true;
  // permiso parcial: solo puede editar Día de hoy
  return vista === 'hoy';
}

/* ---------------- Gestión de usuarios (solo accesible para rol admin) ---------------- */

async function crearUsuario(usuario, password, rol){
  const email = usuarioToEmail(usuario);
  try{
    const cred = await fbAuthSecondary.createUserWithEmailAndPassword(email, password);
    const uid = cred.user.uid;
    await fbDb.collection("usuarios").doc(uid).set({ usuario: usuario.trim().toLowerCase().replace(/\s+/g,''), rol });
    await fbAuthSecondary.signOut(); // cierra la sesión de la instancia secundaria (no afecta al admin)
    return { ok:true };
  }catch(err){
    let msg = 'No se pudo crear el usuario.';
    if(err.code === 'auth/email-already-in-use') msg = 'Ese nombre de usuario ya existe.';
    if(err.code === 'auth/weak-password') msg = 'La contraseña debe tener al menos 6 caracteres.';
    return { ok:false, msg };
  }
}

async function borrarUsuario(usuarioId){
  // Nota: esto borra el documento de rol en Firestore. La cuenta de Firebase Auth
  // en sí (email/password) no se puede borrar desde el cliente sin Admin SDK —
  // queda inutilizada en la práctica porque ya no tiene rol asignado y, si hace
  // falta liberarla del todo, se puede borrar manualmente desde la consola de Firebase.
  await fbDb.collection("usuarios").doc(usuarioId).delete();
}

async function cambiarMiPassword(passwordActual, passwordNueva){
  const user = fbAuth.currentUser;
  if(!user) return { ok:false, msg:'No hay sesión activa.' };
  try{
    const cred = firebase.auth.EmailAuthProvider.credential(user.email, passwordActual);
    await user.reauthenticateWithCredential(cred);
    await user.updatePassword(passwordNueva);
    return { ok:true };
  }catch(err){
    let msg = 'No se pudo cambiar la contraseña.';
    if(err.code === 'auth/wrong-password') msg = 'La contraseña actual es incorrecta.';
    if(err.code === 'auth/weak-password') msg = 'La contraseña nueva debe tener al menos 6 caracteres.';
    return { ok:false, msg };
  }
}

/* ---------------- DB -> Firestore (escritura) ----------------
   Estrategia: cada colección se reescribe completa (batch) cada vez que
   cambia. Para esta escala de datos (decenas de operarios/eventos) es
   simple, segura y evita tener que cablear un método distinto por cada
   tipo de mutación en las 5 vistas. */
let _guardando = false;
async function guardarTodoEnFirestore(){
  if(_guardando) return;
  _guardando = true;
  document.getElementById('syncStatus')?.classList.add('syncing');
  try{
    for(const col of COLECCIONES){
      const batch = fbDb.batch();
      const snap = await fbDb.collection(col).get();
      // borra lo que ya no está en memoria
      snap.docs.forEach(docSnap=>{
        if(!DB[col].find(item=> item.id === docSnap.id)){
          batch.delete(docSnap.ref);
        }
      });
      // upsert de lo que sí está
      DB[col].forEach(item=>{
        const { id, ...rest } = item;
        batch.set(fbDb.collection(col).doc(id), rest);
      });
      await batch.commit();
    }
    await fbDb.collection("config").doc("general").set({
      operadoresEnAnotaciones: DB.operadoresEnAnotaciones,
      notasGenerales: DB.notasGenerales,
      asistenciaHoy: DB.asistenciaHoy,
      historialOcultos: DB.historialOcultos,
    });
  }catch(err){
    console.error("Error guardando en Firestore:", err);
    Toast.show("No se pudo guardar — revisá tu conexión");
  }finally{
    _guardando = false;
    document.getElementById('syncStatus')?.classList.remove('syncing');
  }
}

/* ---------------- BUS DE EVENTOS ----------------
   Las distintas vistas se suscriben a "db:changed" para re-renderizarse
   cuando otra pestaña modifica datos compartidos (ej: Pestaña 4 marca
   ausente -> Pestaña 2 debe repintar la celda de hoy). */
const Bus = {
  listeners: [],
  on(fn){ this.listeners.push(fn); },
  render(){ this.listeners.forEach(fn => fn()); },
  emit(){
    // 1) re-renderiza inmediatamente con el estado local (UI optimista)
    this.render();
    // 2) persiste el nuevo estado en Firestore
    guardarTodoEnFirestore();
  },
};

/* ---------------- HELPERS DE FECHA ---------------- */
const DateUtil = {
  parse(iso){ // 'YYYY-MM-DD' -> Date (local, sin desfasaje horario)
    const [y,m,d] = iso.split('-').map(Number);
    return new Date(y, m-1, d);
  },
  toISO(date){
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  },
  addDays(iso, n){
    const d = this.parse(iso);
    d.setDate(d.getDate()+n);
    return this.toISO(d);
  },
  diffDays(isoA, isoB){ // isoB - isoA en días
    const a = this.parse(isoA), b = this.parse(isoB);
    return Math.round((b-a) / 86400000);
  },
  formatShort(iso){ // '2026-06-23' -> '23/6/26'
    const [y,m,d] = iso.split('-');
    return `${parseInt(d)}/${parseInt(m)}/${y.slice(2)}`;
  },
  formatDDMM(iso){
    const [y,m,d] = iso.split('-');
    return `${parseInt(d)}-${parseInt(m)}`;
  },
  formatLong(iso){
    const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const d = this.parse(iso);
    return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
  },
  daysInMonth(year, monthIndex){ // monthIndex 0-11
    return new Date(year, monthIndex+1, 0).getDate();
  },
  calcAntiguedad(fechaIngresoISO){
    if(!fechaIngresoISO) return '—';
    const ing = this.parse(fechaIngresoISO);
    const hoy = this.parse(HOY);
    let anios = hoy.getFullYear() - ing.getFullYear();
    const cumpleEsteAnio = new Date(hoy.getFullYear(), ing.getMonth(), ing.getDate());
    if(hoy < cumpleEsteAnio) anios--;
    if(anios < 0) anios = 0;
    return anios === 1 ? '1 año' : `${anios} años`;
  }
};

/* ---------------- MODAL GENÉRICO ----------------
   Modal.open({ title, bodyHTML, confirmText, onConfirm, onMount }) */
const Modal = {
  overlay: null,
  ensure(){
    if(this.overlay) return;
    const wrap = document.createElement('div');
    wrap.className = 'modal-overlay';
    wrap.innerHTML = `
      <div class="modal">
        <div class="modal-head">
          <h3 id="modalTitle"></h3>
          <button class="btn-icon" id="modalClose" aria-label="Cerrar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-foot">
          <button class="btn" id="modalCancel">Cancelar</button>
          <button class="btn btn-primary" id="modalConfirm">Confirmar</button>
        </div>
      </div>`;
    document.body.appendChild(wrap);
    this.overlay = wrap;
    wrap.addEventListener('click', (e)=>{ if(e.target === wrap) this.close(); });
    wrap.querySelector('#modalClose').addEventListener('click', ()=> this.close());
    wrap.querySelector('#modalCancel').addEventListener('click', ()=> this.close());
  },
  open({ title, bodyHTML, confirmText='Confirmar', onConfirm, onMount, onClose }){
    this.ensure();
    this._onClose = onClose || null;
    this._confirmed = false;
    this.overlay.querySelector('#modalTitle').textContent = title;
    this.overlay.querySelector('#modalBody').innerHTML = bodyHTML;
    const confirmBtn = this.overlay.querySelector('#modalConfirm');
    confirmBtn.textContent = confirmText;
    const newBtn = confirmBtn.cloneNode(true);
    confirmBtn.replaceWith(newBtn);
    newBtn.addEventListener('click', ()=>{
      const result = onConfirm ? onConfirm(this.overlay.querySelector('#modalBody')) : true;
      if(result !== false){ this._confirmed = true; this.close(); }
    });
    this.overlay.classList.add('open');
    if(onMount) onMount(this.overlay.querySelector('#modalBody'));
  },
  close(){
    if(this.overlay) this.overlay.classList.remove('open');
    if(!this._confirmed && this._onClose) this._onClose();
    this._onClose = null;
  }
};

/* ---------------- HELPERS DE DOMINIO COMPARTIDOS ---------------- */
const Domain = {
  getOperador(id){ return DB.operadores.find(o=> o.id === id); },

  eventosDeFecha(operadorId, fecha){
    return DB.eventos.filter(e=> e.operadorId === operadorId && e.fecha === fecha);
  },

  // Evento "bloqueante" de una fecha puntual (vacaciones/licencia/ausente) — el primero que matchee
  eventoBloqueante(operadorId, fecha){
    return DB.eventos.find(e=> e.operadorId===operadorId && e.fecha===fecha &&
      (e.tipo==='vacaciones' || e.tipo==='licencia' || e.tipo==='ausente'));
  },

  // Devuelve { tipo, hasta } del bloque consecutivo de un tipo que contiene `fecha`
  bloqueConsecutivo(operadorId, fecha, tipo){
    const fechasDelTipo = new Set(
      DB.eventos.filter(e=> e.operadorId===operadorId && e.tipo===tipo).map(e=> e.fecha)
    );
    if(!fechasDelTipo.has(fecha)) return null;
    let hasta = fecha;
    while(fechasDelTipo.has(DateUtil.addDays(hasta,1))){
      hasta = DateUtil.addDays(hasta,1);
    }
    let desde = fecha;
    while(fechasDelTipo.has(DateUtil.addDays(desde,-1))){
      desde = DateUtil.addDays(desde,-1);
    }
    return { tipo, desde, hasta };
  },

  // ============================================================
  // HELPERS DE PERÍODO (formato "AAAA/AAAA+1")
  // Compatibilidad: si el lote tiene {anio} en vez de {periodo}, lo convierte automáticamente.
  // ============================================================

  // Convierte un número de año al string de período: 2025 → "2025/2026"
  anioToPeriodo(anio){ return `${anio}/${anio+1}`; },

  // Devuelve el período de un lote, leyendo {periodo} o convirtiendo {anio} si existe
  loteGetPeriodo(lote){
    if(lote.periodo) return lote.periodo;
    if(lote.anio) return this.anioToPeriodo(lote.anio);
    return '?';
  },

  // Ordena períodos correctamente: "2024/2025" < "2025/2026" (comparación de strings funciona)
  ordenarPeriodos(a, b){ return this.loteGetPeriodo(a).localeCompare(this.loteGetPeriodo(b)); },

  // Saldo total de vacaciones VIGENTES:
  // = días cargados en créditos - días YA pasados (fecha <= HOY).
  // Los días futuros asignados en el calendario siguen contando como disponibles
  // hasta que pasen (según la lógica pedida: al vencer se descuentan).
  saldoVacaciones(operadorId){
    const cargado = DB.vacacionesCreditos
      .filter(v=> v.operadorId===operadorId)
      .reduce((sum,v)=> sum+v.dias, 0);
    // días ya disfrutados (pasados): descuentan el saldo permanentemente
    const pasados = DB.eventos.filter(e=>
      e.operadorId===operadorId && e.tipo==='vacaciones' && e.fecha <= HOY
    ).length;
    return cargado - pasados;
  },

  // Días asignados en el calendario que todavía NO pasaron (futuros = pendientes)
  vacacionesPendientesFuturas(operadorId){
    return DB.eventos.filter(e=> e.operadorId===operadorId && e.tipo==='vacaciones' && e.fecha > HOY).length;
  },

  // Días asignados en el calendario que YA pasaron (ya disfrutados)
  vacacionesPasadas(operadorId){
    return DB.eventos.filter(e=> e.operadorId===operadorId && e.tipo==='vacaciones' && e.fecha <= HOY).length;
  },

  // Si el saldo quedó negativo, borra vacaciones futuras empezando por las más nuevas
  corregirSaldoNegativoVacaciones(operadorId){
    let saldo = this.saldoVacaciones(operadorId);
    if(saldo >= 0) return 0;
    let borrados = 0;
    const futuros = DB.eventos
      .filter(e=> e.operadorId===operadorId && e.tipo==='vacaciones' && e.fecha > HOY)
      .sort((a,b)=> b.fecha.localeCompare(a.fecha));
    for(const ev of futuros){
      if(saldo >= 0) break;
      DB.eventos = DB.eventos.filter(e=> e.id !== ev.id);
      saldo++;
      borrados++;
    }
    return borrados;
  },

  // Lotes con saldo restante calculado por FIFO de período, excluyendo días ya pasados.
  // Los lotes agotados (restante===0) siguen apareciendo pero marcados como agotados.
  lotesVacacionesConSaldo(operadorId){
    const lotes = DB.vacacionesCreditos
      .filter(v=> v.operadorId===operadorId)
      .sort((a,b)=> this.ordenarPeriodos(a,b));
    let usadosPasados = this.vacacionesPasadas(operadorId); // solo los ya disfrutados reducen el saldo
    return lotes.map(lote=>{
      const consumido = Math.min(usadosPasados, lote.dias);
      const restante = lote.dias - consumido;
      usadosPasados -= consumido;
      return { ...lote, periodo: this.loteGetPeriodo(lote), restante, agotado: restante===0 };
    });
  },

  // Suma `dias` a un período específico de CADA operador (para el botón "Asignar a todos")
  asignarCreditoATodos(dias, periodo){
    let afectados = 0;
    DB.operadores.forEach(op=>{
      const lote = DB.vacacionesCreditos.find(v=> v.operadorId===op.id && this.loteGetPeriodo(v)===periodo);
      if(lote){
        lote.dias += dias;
      } else {
        DB.vacacionesCreditos.push({ id:'vc_'+Date.now()+'_'+op.id, operadorId:op.id, periodo, dias });
      }
      afectados++;
    });
    return afectados;
  },


  // Saldo de compensatorios disponibles (créditos cargados - francos ya tomados)
  saldoFrancos(operadorId){
    const cargados = DB.compensatorios.filter(c=> c.operadorId===operadorId).length;
    const tomados = DB.eventos.filter(e=> e.operadorId===operadorId && e.tipo==='franco').length;
    return cargados - tomados;
  },

  // Créditos de compensatorio aún no consumidos, ordenados del más viejo al más nuevo (FIFO).
  // Los créditos "sin fecha" se tratan como los más antiguos (se consumen primero).
  creditosCompensatorioDisponibles(operadorId){
    const todos = DB.compensatorios
      .filter(c=> c.operadorId===operadorId)
      .sort((a,b)=>{
        if(a.sinFecha && !b.sinFecha) return -1;
        if(!a.sinFecha && b.sinFecha) return 1;
        return (a.diaAFavor||'').localeCompare(b.diaAFavor||'');
      });
    const tomados = DB.eventos.filter(e=> e.operadorId===operadorId && e.tipo==='franco').length;
    return todos.slice(tomados); // los primeros `tomados` ya se consumieron (FIFO)
  },

  // Descuenta 1 día de vacaciones del lote más antiguo con saldo > 0. Devuelve true si pudo.
  descontarVacacion(operadorId){
    const lotes = DB.vacacionesCreditos
      .filter(v=> v.operadorId===operadorId)
      .sort((a,b)=> this.ordenarPeriodos(a,b));
    let usados = DB.eventos.filter(e=> e.operadorId===operadorId && e.tipo==='vacaciones').length;
    for(const lote of lotes){
      if(usados < lote.dias){
        return true;
      }
      usados -= lote.dias;
    }
    return false;
  },

  proximosEventos(){
    // genera alertas: próximos a EMPEZAR vacaciones/licencia, y próximos a TERMINAR
    const alerts = [];
    const tipos = ['vacaciones','licencia'];
    for(const tipo of tipos){
      // agrupar eventos por operador en bloques consecutivos
      const porOperador = {};
      DB.eventos.filter(e=> e.tipo===tipo).forEach(e=>{
        (porOperador[e.operadorId] ||= []).push(e.fecha);
      });
      Object.entries(porOperador).forEach(([opId, fechas])=>{
        fechas = [...new Set(fechas)].sort();
        // detectar bloques consecutivos
        let bloque = [fechas[0]];
        const bloques = [];
        for(let i=1;i<fechas.length;i++){
          if(DateUtil.diffDays(fechas[i-1], fechas[i]) === 1){
            bloque.push(fechas[i]);
          } else {
            bloques.push(bloque); bloque=[fechas[i]];
          }
        }
        bloques.push(bloque);
        bloques.forEach(b=>{
          const desde = b[0], hasta = b[b.length-1];
          const op = Domain.getOperador(opId);
          if(!op) return;
          const diffInicio = DateUtil.diffDays(HOY, desde);
          const diffFin = DateUtil.diffDays(HOY, hasta);
          if(diffInicio > 0){
            alerts.push({ dias: diffInicio, texto: `En ${diffInicio} día${diffInicio===1?'':'s'} empiezan ${tipo} de "${op.apellidoNombre}"` });
          } else if(diffInicio <= 0 && diffFin >= 0){
            if(diffFin > 0){
              alerts.push({ dias: diffFin, texto: `En ${diffFin} día${diffFin===1?'':'s'} termina la ${tipo==='licencia'?'licencia':'vacaciones'} de "${op.apellidoNombre}"` });
            }
          }
        });
      });
    }
    alerts.sort((a,b)=> a.dias-b.dias);
    return alerts;
  },

  // Vacaciones que arrancan en el mes calendario siguiente al actual (para el reporte mensual)
  vacacionesDelProximoMes(){
    const hoyDate = DateUtil.parse(HOY);
    let mesObjetivo = hoyDate.getMonth() + 1;
    let anioObjetivo = hoyDate.getFullYear();
    if(mesObjetivo > 11){ mesObjetivo = 0; anioObjetivo++; }

    const porOperador = {};
    DB.eventos.filter(e=> e.tipo==='vacaciones').forEach(e=>{
      (porOperador[e.operadorId] ||= []).push(e.fecha);
    });

    const resultado = [];
    Object.entries(porOperador).forEach(([opId, fechas])=>{
      fechas = [...new Set(fechas)].sort();
      let bloque = [fechas[0]];
      const bloques = [];
      for(let i=1;i<fechas.length;i++){
        if(DateUtil.diffDays(fechas[i-1], fechas[i]) === 1){
          bloque.push(fechas[i]);
        } else {
          bloques.push(bloque); bloque=[fechas[i]];
        }
      }
      bloques.push(bloque);
      bloques.forEach(b=>{
        const desde = b[0], hasta = b[b.length-1];
        const dDesde = DateUtil.parse(desde);
        if(dDesde.getMonth() === mesObjetivo && dDesde.getFullYear() === anioObjetivo){
          const op = Domain.getOperador(opId);
          if(!op) return;
          resultado.push({ operador: op.apellidoNombre, desde, hasta, dias: b.length });
        }
      });
    });
    resultado.sort((a,b)=> a.desde.localeCompare(b.desde));
    return resultado;
  },

  // ---------------- HISTORIAL DE EVENTOS ----------------

  // Agrupa fechas consecutivas de un mismo tipo/operador en bloques {desde, hasta, dias}
  _agruparBloques(fechas){
    fechas = [...new Set(fechas)].sort();
    if(fechas.length === 0) return [];
    let bloque = [fechas[0]];
    const bloques = [];
    for(let i=1;i<fechas.length;i++){
      if(DateUtil.diffDays(fechas[i-1], fechas[i]) === 1) bloque.push(fechas[i]);
      else { bloques.push(bloque); bloque=[fechas[i]]; }
    }
    bloques.push(bloque);
    return bloques.map(b=> ({ desde:b[0], hasta:b[b.length-1], dias:b.length }));
  },

  // Vacaciones cuyo bloque ya terminó (hasta < HOY), agrupadas por operario
  historialVacaciones(){
    const porOperador = {};
    DB.eventos.filter(e=> e.tipo==='vacaciones' && !DB.historialOcultos.includes(e.id))
      .forEach(e=> (porOperador[e.operadorId] ||= []).push(e.fecha));
    const resultado = {};
    Object.entries(porOperador).forEach(([opId, fechas])=>{
      const bloques = this._agruparBloques(fechas).filter(b=> b.hasta < HOY);
      if(bloques.length){
        const ids = bloques.flatMap(b=> {
          const idsDelBloque = [];
          let cur = b.desde;
          while(true){
            const ev = DB.eventos.find(e=> e.operadorId===opId && e.fecha===cur && e.tipo==='vacaciones');
            if(ev) idsDelBloque.push(ev.id);
            if(cur === b.hasta) break;
            cur = DateUtil.addDays(cur, 1);
          }
          return idsDelBloque;
        });
        resultado[opId] = { bloques, ids };
      }
    });
    return resultado;
  },

  // Francos cuya fecha de goce ya pasó, agrupados por operario
  historialFrancos(){
    const porOperador = {};
    DB.eventos.filter(e=> e.tipo==='franco' && e.fecha < HOY && !DB.historialOcultos.includes(e.id))
      .forEach(e=> (porOperador[e.operadorId] ||= []).push(e));
    return porOperador;
  },

  // Contador histórico de ausencias y licencias por operario, con detalle de fechas
  historialAusenciasLicencias(){
    const resultado = {};
    DB.eventos.filter(e=> (e.tipo==='ausente' || e.tipo==='licencia') && e.fecha < HOY && !DB.historialOcultos.includes(e.id))
      .forEach(e=>{
        if(!resultado[e.operadorId]) resultado[e.operadorId] = { ausencias:[], licencias:[] };
        if(e.tipo==='ausente') resultado[e.operadorId].ausencias.push(e);
        else resultado[e.operadorId].licencias.push(e);
      });
    return resultado;
  }
};

const ViewCalendario = {
  mesActual: null,
  seleccion: null,
  dragging: false,
  dragOperadorId: null,
  dragStartFecha: null,
  filtros: { AM: true, PM: true, COORD: true },

  ESTILOS: {
    vacaciones:      { bg:'var(--vacation-soft)',  fg:'#8A6520', label:(e)=> 'vacaciones' },
    vacacionesPasadas:{ bg:'#EDE9E0',              fg:'#AAA090', label:(e)=> 'vacaciones ✓' },
    licencia:        { bg:'var(--brick-soft)',  fg:'var(--brick)', label:(e)=> 'licencia' },
    franco:          { bg:'var(--sage-soft)',   fg:'var(--sage)', label:(e)=> e.origenFranco ? `compensó (${DateUtil.formatDDMM(e.origenFranco)})` : 'compensatorio' },
    cambioTurno:     { bg:'#2A3245',            fg:'#fff',         label:(e)=> e.turnoCambio === 'Nocturno' ? 'noche' : `cambio a ${e.turnoCambio}` },
    ausente:         { bg:'var(--brick-soft)',  fg:'var(--brick)', label:(e)=> 'ausente' },
    turnoCoord:      { bg:'#EDE6F5',            fg:'#6B4E96',      label:(e)=> e.turnoDia },
  },

  init(){
    const hoyDate = DateUtil.parse(HOY);
    this.mesActual = { year: hoyDate.getFullYear(), monthIndex: hoyDate.getMonth() };
  },

  render(){
    if(!this.mesActual) this.init();
    const el = document.getElementById('view-calendario');
    const { year, monthIndex } = this.mesActual;
    const nDays = DateUtil.daysInMonth(year, monthIndex);
    const fechas = Array.from({length:nDays}, (_,i)=> {
      const d = new Date(year, monthIndex, i+1);
      return DateUtil.toISO(d);
    });
    const nombreMes = DateUtil.parse(fechas[0]).toLocaleDateString('es-AR', { month:'long', year:'numeric' });

    const amOps = DB.operadores.filter(o=> o.turno === 'AM' && o.sector !== 'Coordinacion');
    const pmOps = DB.operadores.filter(o=> o.turno === 'PM' && o.sector !== 'Coordinacion');
    const coordOps = DB.operadores.filter(o=> o.sector === 'Coordinacion');

    el.innerHTML = `
      <div class="cal-toolbar">
        <div class="cal-nav">
          <button class="btn-icon" id="calPrev" aria-label="Mes anterior">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <span class="cal-mes-label">${this.cap(nombreMes)}</span>
          <button class="btn-icon" id="calNext" aria-label="Mes siguiente">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
        <div class="cal-filtros">
          <span class="cal-filtros-label">Ver:</span>
          <label class="cal-chk-label"><input type="checkbox" id="filtroAM" ${this.filtros.AM?'checked':''}> AM — Mañana</label>
          <label class="cal-chk-label"><input type="checkbox" id="filtroPM" ${this.filtros.PM?'checked':''}> PM — Tarde</label>
          ${coordOps.length > 0 ? `<label class="cal-chk-label"><input type="checkbox" id="filtroCOORD" ${this.filtros.COORD?'checked':''}> Coordinadores</label>` : ''}
        </div>
        <div class="cal-legend">
          <span class="leg-item"><i style="background:var(--vacation-soft);border:1px solid var(--vacation)"></i>Vacaciones</span>
          <span class="leg-item"><i style="background:var(--brick-soft);border:1px solid var(--brick)"></i>Licencia</span>
          <span class="leg-item"><i style="background:var(--sage-soft);border:1px solid var(--sage)"></i>Compensatorio</span>
          <span class="leg-item"><i style="background:#2A3245"></i>Cambio de turno</span>
        </div>
      </div>

      <div class="cal-bloques-wrapper">
      <div class="cal-block" data-turno="AM" ${!this.filtros.AM?'style="display:none"':''}>
        <div class="cal-block-head"><span class="tag tag-am">AM</span> Turno mañana</div>
        <div class="scroll-x cal-scroll" id="calScrollAM">
          ${this.gridHTML(amOps, fechas)}
        </div>
      </div>

      <div class="cal-block" data-turno="PM" style="${!this.filtros.PM?'display:none':''}">
        <div class="cal-block-head"><span class="tag tag-pm">PM</span> Turno tarde</div>
        <div class="scroll-x cal-scroll" id="calScrollPM">
          ${this.gridHTML(pmOps, fechas)}
        </div>
      </div>

      ${coordOps.length > 0 ? `
      <div class="cal-block" data-turno="COORD" style="${!this.filtros.COORD?'display:none':''}">
        <div class="cal-block-head"><span class="tag tag-coord">COORD</span> Coordinadores</div>
        <div class="scroll-x cal-scroll" id="calScrollCOORD">
          ${this.gridHTML(coordOps, fechas)}
        </div>
      </div>` : ''}
      </div>

      <div class="cal-action-panel" id="calActionPanel" style="display:none;"></div>
    `;

    this.injectStyles();
    this.bindToolbar();
    this.bindGrid(el);
    this.syncScroll();
    this.scrollToHoy();
  },

  cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); },

  gridHTML(ops, fechas){
    const colWidth = 78;
    return `
      <table class="cal-table" style="--colw:${colWidth}px;">
        <thead>
          <tr class="cal-hoy-row">
            <td class="cal-namecol"></td>
            ${fechas.map(f=> `<td class="${f===HOY?'is-hoy-marker':''}">${f===HOY?'HOY':''}</td>`).join('')}
          </tr>
          <tr>
            <td class="cal-namecol">Operario</td>
            ${fechas.map(f=>{
              const d = DateUtil.parse(f);
              const dow = d.getDay(); // 0=dom, 6=sáb
              const esWeekend = dow === 0 || dow === 6;
              const diasAbrev = ['dom','lun','mar','mié','jue','vie','sáb'];
              const nombreDia = diasAbrev[dow];
              const diaLabel = `${d.getDate()}-${d.getMonth()+1}`;
              const clases = ['cal-daycol', f===HOY?'is-hoy':'', esWeekend?'is-weekend':''].filter(Boolean).join(' ');
              return `<td class="${clases}" data-fecha="${f}"><span class="cal-day-name">${nombreDia}</span><span class="cal-day-num">${diaLabel}</span></td>`;
            }).join('')}
          </tr>
        </thead>
        <tbody>
          ${ops.map(op=> this.rowHTML(op, fechas)).join('')}
        </tbody>
      </table>
    `;
  },

  rowHTML(op, fechas){
    return `
      <tr data-operador-id="${op.id}">
        <td class="cal-namecol">${this.esc(op.apellidoNombre)}</td>
        ${fechas.map(f=> this.cellHTML(op.id, f)).join('')}
      </tr>
    `;
  },

  cellHTML(operadorId, fecha){
    const eventosDia = Domain.eventosDeFecha(operadorId, fecha);
    const ev = eventosDia.find(e=> e.tipo !== 'turnoCoord') || eventosDia[0];
    const dow = DateUtil.parse(fecha).getDay();
    const esWeekend = dow === 0 || dow === 6;
    let style = '', label = '', cls = 'cal-cell';
    if(fecha === HOY) cls += ' is-hoy';
    if(esWeekend && !ev) cls += ' is-weekend';
    if(ev){
      // vacaciones ya pasadas se muestran con estilo opaco diferenciado
      const tipoEstilo = (ev.tipo === 'vacaciones' && fecha < HOY) ? 'vacacionesPasadas' : ev.tipo;
      const e = this.ESTILOS[tipoEstilo] || this.ESTILOS[ev.tipo];
      if(e){
        style = `background:${e.bg};color:${e.fg};`;
        label = e.label(ev);
        cls += ` cal-cell-evt evt-${ev.tipo}`;
        if(esWeekend) cls += ' is-weekend';
      }
    }
    return `<td class="${cls}" data-operador-id="${operadorId}" data-fecha="${fecha}" style="${style}">${label}</td>`;
  },

  esc(s){ return (s||'').toString().replace(/"/g,'&quot;'); },

  injectStyles(){
    if(document.getElementById('calStyles')) return;
    const style = document.createElement('style');
    style.id = 'calStyles';
    style.textContent = `
      .cal-toolbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
      .cal-nav{ display:flex; align-items:center; gap:10px; }

      thead .cal-namecol{ background:var(--paper-dim); font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-dim); font-weight:700; }

      .cal-cell{ cursor:pointer; transition:background .08s; position:relative; }

      .cal-chk-label{
        display:inline-flex; align-items:center; gap:5px; cursor:pointer;
        user-select:none; padding:5px 11px; border-radius:20px; font-size:11px; font-weight:600;

      }

      .cal-cell-evt:hover{ filter:brightness(0.96); }
      .cal-cell.is-selecting{ background:var(--steel) !important; box-shadow:inset 0 0 0 2px var(--navy); }

      .cal-action-panel{
        position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
        background:var(--navy); color:#fff; border-radius:10px; padding:12px 16px;
        box-shadow:0 14px 40px rgba(0,0,0,.32); z-index:60;
        display:flex; align-items:center; gap:12px; flex-wrap:wrap; max-width:90vw;
      }
      .cal-action-panel .ap-info{ font-size:12px; color:rgba(255,255,255,.7); padding-right:10px; border-right:1px solid rgba(255,255,255,.18); }
      .cal-action-panel .ap-info strong{ color:#fff; }
      .cal-action-panel button{
        background:rgba(255,255,255,.08); color:#fff; border:1px solid rgba(255,255,255,.18);
        padding:7px 13px; border-radius:6px; font-size:12px; font-weight:600;
      }
      .cal-action-panel button:hover{ background:rgba(255,255,255,.18); }
      .cal-action-panel button.ap-cancel{ background:transparent; border-color:transparent; color:rgba(255,255,255,.55); }
    `;
    document.head.appendChild(style);
  },

  bindToolbar(){
    document.getElementById('calPrev').addEventListener('click', ()=>{
      let { year, monthIndex } = this.mesActual;
      monthIndex--; if(monthIndex<0){ monthIndex=11; year--; }
      this.mesActual = { year, monthIndex };
      this.clearSeleccion();
      this.render();
    });
    document.getElementById('calNext').addEventListener('click', ()=>{
      let { year, monthIndex } = this.mesActual;
      monthIndex++; if(monthIndex>11){ monthIndex=0; year++; }
      this.mesActual = { year, monthIndex };
      this.clearSeleccion();
      this.render();
    });
    // checkboxes de filtro de bloques — toggle sin re-render completo (solo muestra/oculta el bloque)
    ['AM','PM','COORD'].forEach(turno=>{
      const chk = document.getElementById(`filtro${turno}`);
      if(!chk) return;
      chk.addEventListener('change', (e)=>{
        this.filtros[turno] = e.target.checked;
        const bloque = document.querySelector(`.cal-block[data-turno="${turno}"]`);
        if(bloque) bloque.style.display = e.target.checked ? '' : 'none';
      });
    });
  },

  syncScroll(){
    // mantiene alineadas las columnas de fecha entre los bloques AM, PM y COORD al hacer scroll horizontal
    const blocks = ['calScrollAM','calScrollPM','calScrollCOORD']
      .map(id=> document.getElementById(id))
      .filter(Boolean);
    if(blocks.length < 2) return;
    let syncing = false;
    blocks.forEach(src=>{
      src.addEventListener('scroll', ()=>{
        if(syncing) return;
        syncing = true;
        blocks.forEach(other=>{ if(other !== src) other.scrollLeft = src.scrollLeft; });
        syncing = false;
      });
    });
  },

  scrollToHoy(){
    // enfoca automáticamente la columna de HOY al abrir/cambiar de mes, si está dentro del mes visible
    const doScroll = ()=>{
      const blocks = ['calScrollAM','calScrollPM','calScrollCOORD']
        .map(id=> document.getElementById(id))
        .filter(Boolean);
      const first = blocks[0];
      if(!first) return;
      const hoyCell = first.querySelector(`.cal-daycol[data-fecha="${HOY}"]`);
      if(!hoyCell) return;
      const targetLeft = Math.max(0, hoyCell.offsetLeft - first.clientWidth/2 + hoyCell.clientWidth/2);
      blocks.forEach(b=> b.scrollLeft = targetLeft);
    };
    requestAnimationFrame(doScroll);
    setTimeout(doScroll, 80); // refuerzo por si el layout no estaba asentado en el primer frame
  },

  bindGrid(root){
    root.querySelectorAll('.cal-cell').forEach(cell=>{
      cell.addEventListener('mousedown', (e)=> this.onCellMouseDown(e));
      cell.addEventListener('mouseenter', (e)=> this.onCellMouseEnter(e));
    });
    document.addEventListener('mouseup', this._mouseUpHandler || (this._mouseUpHandler = ()=> this.onMouseUp()));
  },

  onCellMouseDown(e){
    e.preventDefault();
    this.dragging = true;
    this.dragOperadorId = e.currentTarget.dataset.operadorId;
    this.dragStartFecha = e.currentTarget.dataset.fecha;
    this.paintSelectionRange(this.dragOperadorId, this.dragStartFecha, this.dragStartFecha);
  },

  onCellMouseEnter(e){
    if(!this.dragging) return;
    if(e.currentTarget.dataset.operadorId !== this.dragOperadorId) return; // no cruzar de fila
    this.paintSelectionRange(this.dragOperadorId, this.dragStartFecha, e.currentTarget.dataset.fecha);
  },

  onMouseUp(){
    if(!this.dragging) return;
    this.dragging = false;
    if(this.seleccion && this.seleccion.fechas.length){
      this.showActionPanel();
    }
  },

  paintSelectionRange(operadorId, fechaA, fechaB){
    document.querySelectorAll('.cal-cell.is-selecting').forEach(c=> c.classList.remove('is-selecting'));
    let [desde, hasta] = [fechaA, fechaB];
    if(DateUtil.diffDays(desde, hasta) < 0) [desde, hasta] = [hasta, desde];
    const fechas = [];
    let cur = desde;
    while(true){
      fechas.push(cur);
      if(cur === hasta) break;
      cur = DateUtil.addDays(cur, 1);
    }
    fechas.forEach(f=>{
      const cell = document.querySelector(`.cal-cell[data-operador-id="${operadorId}"][data-fecha="${f}"]`);
      if(cell) cell.classList.add('is-selecting');
    });
    this.seleccion = { operadorId, fechas };
  },

  clearSeleccion(){
    document.querySelectorAll('.cal-cell.is-selecting').forEach(c=> c.classList.remove('is-selecting'));
    this.seleccion = null;
    const panel = document.getElementById('calActionPanel');
    if(panel) panel.style.display = 'none';
  },

  showActionPanel(){
    const panel = document.getElementById('calActionPanel');
    if(!panel) return;
    const { operadorId, fechas } = this.seleccion;
    const op = Domain.getOperador(operadorId);
    const n = fechas.length;
    const saldoVac = Domain.saldoVacaciones(operadorId);
    const saldoFr = Domain.saldoFrancos(operadorId);
    const esCoordinador = op.sector === 'Coordinacion';

    panel.style.display = 'flex';
    panel.innerHTML = `
      <div class="ap-info"><strong>${this.esc(op.apellidoNombre)}</strong><br>${n} día${n===1?'':'s'} seleccionado${n===1?'':'s'}</div>
      <button data-action="vacaciones" title="Saldo disponible: ${saldoVac} días">Vacaciones (${saldoVac} disp.)</button>
      <button data-action="licencia">Licencia</button>
      <button data-action="franco" ${saldoFr<=0 ? 'disabled style="opacity:.4;cursor:not-allowed;"':''} title="Saldo disponible: ${saldoFr} compensatorios">Compensatorio (${saldoFr} disp.)</button>
      <button data-action="ausente">Ausente</button>
      <button data-action="cambioTurno">Cambio de turno</button>
      ${esCoordinador ? `<button data-action="turnoCoord">Turno del día</button>` : ''}
      <button data-action="limpiar" style="background:rgba(181,72,61,.25);border-color:rgba(181,72,61,.4);">Borrar selección</button>
      <button class="ap-cancel" data-action="cancelar">Cancelar</button>
    `;
    panel.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click', ()=> this.onActionClick(btn.dataset.action));
    });
  },

  onActionClick(action){
    const { operadorId, fechas } = this.seleccion;
    const op = Domain.getOperador(operadorId);

    if(action === 'cancelar'){ this.clearSeleccion(); this.render(); return; }

    if(action === 'limpiar'){
      DB.eventos = DB.eventos.filter(e=> !(e.operadorId===operadorId && fechas.includes(e.fecha)));
      Toast.show('Selección borrada');
      this.clearSeleccion();
      this.render();
      Bus.emit();
      return;
    }

    if(action === 'vacaciones'){
      const saldo = Domain.saldoVacaciones(operadorId);
      if(fechas.length > saldo){
        Modal.open({
          title:'Saldo insuficiente',
          bodyHTML:`<p><strong>${this.esc(op.apellidoNombre)}</strong> tiene <strong>${saldo}</strong> día${saldo===1?'':'s'} disponible${saldo===1?'':'s'} de vacaciones, pero seleccionaste ${fechas.length}. Cargá más días en la pestaña "Vacaciones y francos" o reducí la selección.</p>`,
          confirmText:'Entendido',
          onConfirm:()=> true
        });
        return;
      }
      DB.eventos = DB.eventos.filter(e=> !(e.operadorId===operadorId && fechas.includes(e.fecha)));
      fechas.forEach(f=> DB.eventos.push({ id:'ev_'+Date.now()+'_'+f, operadorId, fecha:f, tipo:'vacaciones' }));
      Toast.show(`Vacaciones asignadas (descuenta desde el año más antiguo)`);
      this.clearSeleccion();
      this.render();
      Bus.emit();
      return;
    }

    if(action === 'licencia'){
      DB.eventos = DB.eventos.filter(e=> !(e.operadorId===operadorId && fechas.includes(e.fecha)));
      fechas.forEach(f=> DB.eventos.push({ id:'ev_'+Date.now()+'_'+f, operadorId, fecha:f, tipo:'licencia' }));
      Toast.show('Licencia registrada');
      this.clearSeleccion();
      this.render();
      Bus.emit();
      return;
    }

    if(action === 'ausente'){
      DB.eventos = DB.eventos.filter(e=> !(e.operadorId===operadorId && fechas.includes(e.fecha) && e.tipo==='ausente'));
      fechas.forEach(f=> DB.eventos.push({ id:'ev_aus_'+operadorId+'_'+f, operadorId, fecha:f, tipo:'ausente' }));
      // si entre las fechas está HOY, mantiene sincronizado el switch de la pestaña Día de hoy
      if(fechas.includes(HOY)){
        DB.asistenciaHoy[`${operadorId}_${HOY}`] = 'ausente';
      }
      Toast.show(`Ausencia registrada (${fechas.length} día${fechas.length===1?'':'s'})`);
      this.clearSeleccion();
      this.render();
      Bus.emit();
      return;
    }

    if(action === 'franco'){
      const saldo = Domain.saldoFrancos(operadorId);
      if(saldo <= 0){ Toast.show('No hay compensatorios disponibles para asignar'); return; }
      if(fechas.length > 1){
        Toast.show('Seleccioná un solo día para asignar un compensatorio');
        return;
      }
      this.confirmarFranco(operadorId, fechas[0]);
      return;
    }

    if(action === 'cambioTurno'){
      this.openCambioTurnoModal(operadorId, fechas);
      return;
    }

    if(action === 'turnoCoord'){
      this.openTurnoCoordModal(operadorId, fechas);
      return;
    }
  },

  confirmarFranco(operadorId, fecha){
    // descuento FIFO automático: toma el crédito disponible más viejo (sin fecha cuenta como el más viejo)
    const disponibles = Domain.creditosCompensatorioDisponibles(operadorId);
    const credito = disponibles[0];
    const op = Domain.getOperador(operadorId);
    Modal.open({
      title:'Asignar compensatorio',
      bodyHTML:`<p>Se va a asignar un día de compensatorio para <strong>${this.esc(op.apellidoNombre)}</strong> el día ${DateUtil.formatShort(fecha)}, descontando del crédito ${credito && !credito.sinFecha ? `del ${DateUtil.formatShort(credito.diaAFavor)}` : 'más antiguo sin fecha'}.</p>`,
      confirmText:'Asignar compensatorio',
      onConfirm:()=>{
        DB.eventos = DB.eventos.filter(e=> !(e.operadorId===operadorId && e.fecha===fecha));
        DB.eventos.push({ id:'ev_'+Date.now(), operadorId, fecha, tipo:'franco', origenFranco: credito ? (credito.sinFecha ? '' : credito.diaAFavor) : '' });
        Toast.show('Compensatorio asignado');
        this.clearSeleccion();
        this.render();
        Bus.emit();
      }
    });
  },

  openTurnoCoordModal(operadorId, fechas){
    Modal.open({
      title:'Turno del día — Coordinador',
      bodyHTML:`
        <p>Anotá qué turno cubrió este coordinador en los días seleccionados (solo a fines informativos, no afecta saldos).</p>
        <div class="field">
          <label>Turno</label>
          <select id="turnoCoordSel">
            <option value="AM">AM</option>
            <option value="PM">PM</option>
            <option value="Rotativo">Rotativo</option>
          </select>
        </div>
      `,
      confirmText:'Guardar',
      onConfirm:(body)=>{
        const turnoDia = body.querySelector('#turnoCoordSel').value;
        DB.eventos = DB.eventos.filter(e=> !(e.operadorId===operadorId && fechas.includes(e.fecha) && e.tipo==='turnoCoord'));
        fechas.forEach(f=> DB.eventos.push({ id:'ev_'+Date.now()+'_'+f, operadorId, fecha:f, tipo:'turnoCoord', turnoDia }));
        Toast.show('Turno del día guardado');
        this.clearSeleccion();
        this.render();
        Bus.emit();
      }
    });
  },

  openCambioTurnoModal(operadorId, fechas){
    Modal.open({
      title:'Cambio de turno',
      bodyHTML:`
        <p>Asignar cambio de horario para los días seleccionados. El operario se mantiene en su fila y cuadro original.</p>
        <div class="field">
          <label>Nuevo turno para esos días</label>
          <select id="turnoCambioSel">
            <option value="AM">AM</option>
            <option value="PM">PM</option>
            <option value="Nocturno">Nocturno</option>
          </select>
        </div>
      `,
      confirmText:'Aplicar',
      onConfirm:(body)=>{
        const turnoCambio = body.querySelector('#turnoCambioSel').value;
        DB.eventos = DB.eventos.filter(e=> !(e.operadorId===operadorId && fechas.includes(e.fecha)));
        fechas.forEach(f=> DB.eventos.push({ id:'ev_'+Date.now()+'_'+f, operadorId, fecha:f, tipo:'cambioTurno', turnoCambio }));
        Toast.show('Cambio de turno aplicado');
        this.clearSeleccion();
        this.render();
        Bus.emit();
      }
    });
  }
};

const ViewVacaciones = {

  periodosDisponibles(){
    const anioHoy = DateUtil.parse(HOY).getFullYear();
    const periodos = [];
    for(let a = anioHoy - 4; a <= anioHoy + 2; a++) periodos.push(`${a}/${a+1}`);
    return periodos;
  },

  periodoDefault(){
    const anioHoy = DateUtil.parse(HOY).getFullYear();
    return `${anioHoy}/${anioHoy+1}`;
  },

  render(){
    const el = document.getElementById('view-vacaciones');

    const amOps   = DB.operadores.filter(o=> o.turno==='AM' && o.sector!=='Coordinacion');
    const pmOps   = DB.operadores.filter(o=> o.turno==='PM' && o.sector!=='Coordinacion');
    const coordOps= DB.operadores.filter(o=> o.sector==='Coordinacion');
    const vacMes  = this.vacacionesEsteMes();

    el.innerHTML = `
      <!-- formulario de carga -->
      <div class="panel" style="margin-bottom:14px;">
        <div class="panel-head">
          <h2>Asignar vacaciones</h2>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="count">FIFO por período</span>
            <button class="btn btn-sm btn-primary" id="btnAsignarATodos">+ Asignar a todos</button>
          </div>
        </div>
        <div class="vac-form-row">
          <div class="field" style="margin:0;"><label>Operario</label>
            <select id="vacOpSel" class="vac-sel">
              <option value="">— Seleccionar —</option>
              ${DB.operadores.map(op=>`<option value="${op.id}">${this.esc(op.apellidoNombre)}</option>`).join('')}
            </select>
          </div>
          <div class="field" style="margin:0;"><label>Período</label>
            <select id="vacPeriodoSel" class="vac-sel">
              ${this.periodosDisponibles().map(p=>`<option value="${p}" ${p===this.periodoDefault()?'selected':''}>${p}</option>`).join('')}
            </select>
          </div>
          <div class="field" style="margin:0;"><label>Días</label>
            <input type="number" id="vacDiasInput" value="14" min="1" step="7" style="width:65px;">
          </div>
          <button class="btn btn-primary btn-sm" id="btnCargarCredito">Confirmar carga</button>
        </div>
      </div>

      <!-- 3 cuadros a lo ancho: AM / PM / COORD -->
      <div class="vac-grid">
        <div class="panel vac-panel-turno">
          <div class="panel-head"><h2><span class="tag tag-am">AM</span> Mañana</h2><span class="count">${amOps.length}</span></div>
          <div class="vac-lista" id="vacListaAM">
            ${this.listaHTML(amOps)}
          </div>
        </div>
        <div class="panel vac-panel-turno">
          <div class="panel-head"><h2><span class="tag tag-pm">PM</span> Tarde</h2><span class="count">${pmOps.length}</span></div>
          <div class="vac-lista" id="vacListaPM">
            ${this.listaHTML(pmOps)}
          </div>
        </div>
        ${coordOps.length > 0 ? `
        <div class="panel vac-panel-turno">
          <div class="panel-head"><h2><span class="tag tag-coord">COORD</span> Coordinadores</h2><span class="count">${coordOps.length}</span></div>
          <div class="vac-lista" id="vacListaCOORD">
            ${this.listaHTML(coordOps)}
          </div>
        </div>` : ''}
      </div>

      <!-- cuadro vacaciones del mes corriente -->
      <div class="panel" style="margin-top:14px;">
        <div class="panel-head">
          <h2>Vacaciones asignadas este mes</h2>
          <span class="count">${vacMes.length} asignación${vacMes.length===1?'':'es'}</span>
        </div>
        <div class="hoy-alerts">
          ${vacMes.length === 0
            ? `<div class="empty-state">Todavía no se asignaron vacaciones este mes.</div>`
            : vacMes.map(v=>`<div class="hoy-alert-item"><span class="alert-dot" style="background:var(--vacation);"></span><strong>${this.esc(v.operador)}</strong> — del ${DateUtil.formatShort(v.desde)} al ${DateUtil.formatShort(v.hasta)} (${v.dias} día${v.dias===1?'':'s'})</div>`).join('')
          }
        </div>
      </div>
    `;

    this.injectStyles();
    this.bindEvents(el);
  },

  // lista compacta de operarios al estilo "Día de hoy"
  listaHTML(ops){
    if(ops.length === 0) return `<div class="empty-state">Sin operarios en este turno.</div>`;
    return ops.map(op=>{
      const lotes = Domain.lotesVacacionesConSaldo(op.id);
      const total = lotes.reduce((s,l)=> s+l.dias, 0);
      const enCal = Domain.vacacionesPendientesFuturas(op.id);
      const resto = total - enCal - Domain.vacacionesPasadas(op.id);
      // si no tiene créditos, muestra solo el nombre
      if(lotes.length === 0){
        return `
          <div class="vac-op-row" data-op-id="${op.id}">
            <span class="vac-op-nombre">${this.esc(op.apellidoNombre)}</span>
            <span class="vac-op-sin">sin créditos</span>
          </div>`;
      }
      return `
        <div class="vac-op-row ${resto<0?'vac-op-negativo':''}" data-op-id="${op.id}">
          <span class="vac-op-nombre">${this.esc(op.apellidoNombre)}</span>
          <span class="vac-op-stats">
            <span class="vac-stat-k">Total</span><span class="vac-stat-v">${total}d</span>
            <span class="vac-stat-sep">·</span>
            <span class="vac-stat-k">Cal.</span><span class="vac-stat-v">${enCal}d</span>
            <span class="vac-stat-sep">·</span>
            <span class="vac-stat-k">Resto</span><span class="vac-stat-v ${resto<0?'vac-stat-neg':''}">${resto}d</span>
          </span>
          <button class="vac-op-expand" data-op-id="${op.id}" title="Ver períodos">▾</button>
        </div>
        <div class="vac-op-detalle" id="det_${op.id}" style="display:none;">
          ${lotes.map(l=>`
            <div class="vac-det-row ${l.agotado?'vac-row-agotado':''}">
              <span class="vac-det-periodo">${l.periodo}</span>
              <span class="vac-det-dias">${l.dias}d</span>
              <button class="chip-del" data-credito-id="${l.id}">×</button>
            </div>`).join('')}
          <button class="btn btn-sm vac-det-add" data-action="add-credito" data-id="${op.id}">+ Período</button>
        </div>`;
    }).join('');
  },

  vacacionesEsteMes(){
    const hoyDate = DateUtil.parse(HOY);
    const mes = hoyDate.getMonth(), anio = hoyDate.getFullYear();
    const porOperador = {};
    DB.eventos.filter(e=> e.tipo==='vacaciones').forEach(e=>{
      (porOperador[e.operadorId] ||= []).push(e.fecha);
    });
    const resultado = [];
    Object.entries(porOperador).forEach(([opId, fechas])=>{
      fechas = [...new Set(fechas)].sort();
      let bloque = [fechas[0]];
      const bloques = [];
      for(let i=1;i<fechas.length;i++){
        if(DateUtil.diffDays(fechas[i-1], fechas[i])===1) bloque.push(fechas[i]);
        else { bloques.push(bloque); bloque=[fechas[i]]; }
      }
      bloques.push(bloque);
      bloques.forEach(b=>{
        const d = DateUtil.parse(b[0]);
        if(d.getMonth()===mes && d.getFullYear()===anio){
          const op = Domain.getOperador(opId);
          if(op) resultado.push({ operador:op.apellidoNombre, desde:b[0], hasta:b[b.length-1], dias:b.length });
        }
      });
    });
    return resultado.sort((a,b)=>a.desde.localeCompare(b.desde));
  },

  esc(s){ return (s||'').toString().replace(/"/g,'&quot;'); },

  injectStyles(){
    if(document.getElementById('vacStyles')) return;
    const style = document.createElement('style');
    style.id = 'vacStyles';
    style.textContent = `
      .vac-form-row{ display:flex; align-items:flex-end; gap:8px; padding:10px 14px; flex-wrap:wrap; }
      .vac-sel{ width:auto; min-width:150px; padding:5px 8px; font-size:11.5px; }

      /* Grid de 3 cuadros */
      .vac-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; align-items:start; }
      @media(max-width:1100px){ .vac-grid{ grid-template-columns:1fr 1fr; } }
      @media(max-width:700px){ .vac-grid{ grid-template-columns:1fr; } }
      .vac-panel-turno{ overflow:hidden; }

      /* Filas de operario — estilo "Día de hoy" */
      .vac-lista{ }
      .vac-op-row{
        display:flex; align-items:center; gap:6px;
        padding:6px 14px; border-bottom:1px solid var(--line);
        font-size:10.5px;
      }
      .vac-op-row:last-of-type{ border-bottom:none; }
      .vac-op-nombre{ flex:1; font-weight:600; color:var(--ink); font-size:10.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .vac-op-sin{ font-size:9.5px; color:var(--ink-dim); font-style:italic; }
      .vac-op-negativo .vac-op-nombre{ color:var(--brick); }

      .vac-op-stats{ display:flex; align-items:center; gap:3px; white-space:nowrap; }
      .vac-stat-k{ font-size:8.5px; font-weight:600; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.03em; }
      .vac-stat-v{ font-family:var(--f-mono); font-size:10.5px; font-weight:700; color:var(--navy); }
      .vac-stat-sep{ color:var(--line); font-size:10px; }
      .vac-stat-neg{ color:var(--brick); }

      .vac-op-expand{
        background:none; border:none; cursor:pointer; color:var(--ink-dim);
        font-size:11px; padding:0 4px; line-height:1; transition:transform .15s;
      }
      .vac-op-expand.open{ transform:rotate(180deg); }

      /* Detalle desplegable de períodos */
      .vac-op-detalle{
        background:var(--vacation-soft); border-bottom:1px solid #E5D9B6;
        padding:6px 14px 8px 28px;
      }
      .vac-det-row{
        display:grid; grid-template-columns:1fr 40px 20px;
        align-items:center; padding:2px 0; font-size:10.5px;
      }
      .vac-det-periodo{ font-family:var(--f-mono); font-weight:600; color:#5A4010; }
      .vac-det-dias{ font-family:var(--f-mono); font-weight:700; color:var(--steel); }
      .vac-row-agotado .vac-det-periodo, .vac-row-agotado .vac-det-dias{ opacity:.35; text-decoration:line-through; }
      .chip-del{ background:none; border:none; color:var(--brick); opacity:.4; font-size:13px; cursor:pointer; padding:0 2px; line-height:1; }
      .chip-del:hover{ opacity:1; }
      .vac-det-add{ margin-top:5px; }

      .hoy-alerts{ padding:4px 0; }
      .hoy-alert-item{ display:flex; align-items:center; gap:8px; padding:7px 14px; font-size:10.5px; border-bottom:1px solid var(--line); }
      .hoy-alert-item:last-child{ border-bottom:none; }
      .alert-dot{ width:5px; height:5px; border-radius:50%; background:var(--steel); flex:0 0 5px; }
    `;
    document.head.appendChild(style);
  },

  bindEvents(el){
    // expandir/colapsar detalle de períodos por operario
    el.querySelectorAll('.vac-op-expand').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const opId = e.currentTarget.dataset.opId;
        const det = document.getElementById('det_'+opId);
        const open = det.style.display !== 'none';
        det.style.display = open ? 'none' : '';
        e.currentTarget.classList.toggle('open', !open);
      });
    });

    // borrar lote de período
    el.querySelectorAll('.chip-del').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const creditoId = e.currentTarget.dataset.creditoId;
        const credito = DB.vacacionesCreditos.find(c=> c.id===creditoId);
        if(!credito) return;
        Modal.open({
          title:'Borrar lote de vacaciones',
          bodyHTML:`<p>¿Confirmás borrar el lote <strong>${Domain.loteGetPeriodo(credito)}: ${credito.dias} días</strong> de <strong>${this.esc(Domain.getOperador(credito.operadorId)?.apellidoNombre||'')}</strong>? Si hay vacaciones futuras asignadas que dependan de este saldo, se borran automáticamente del calendario.</p>`,
          confirmText:'Borrar',
          onConfirm:()=>{
            DB.vacacionesCreditos = DB.vacacionesCreditos.filter(c=> c.id!==creditoId);
            const borrados = Domain.corregirSaldoNegativoVacaciones(credito.operadorId);
            Toast.show(borrados>0 ? `Lote eliminado — se quitaron ${borrados} día${borrados===1?'':'s'} del calendario` : 'Lote eliminado');
            this.render(); Bus.emit();
          }
        });
      });
    });

    // agregar período desde el detalle
    el.querySelectorAll('[data-action="add-credito"]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const opId = e.currentTarget.dataset.id;
        Modal.open({
          title:'Agregar período',
          bodyHTML:`
            <div class="field"><label>Período</label>
              <select id="addPeriodoSel" class="vac-sel">
                ${this.periodosDisponibles().map(p=>`<option value="${p}" ${p===this.periodoDefault()?'selected':''}>${p}</option>`).join('')}
              </select>
            </div>
            <div class="field"><label>Días</label>
              <input type="number" id="addDiasInput" value="14" min="1" step="7">
            </div>`,
          confirmText:'Agregar',
          onConfirm:(body)=>{
            const periodo = body.querySelector('#addPeriodoSel').value;
            const dias = parseInt(body.querySelector('#addDiasInput').value)||0;
            const lote = DB.vacacionesCreditos.find(v=> v.operadorId===opId && Domain.loteGetPeriodo(v)===periodo);
            if(lote) lote.dias+=dias;
            else DB.vacacionesCreditos.push({id:'vc_'+Date.now(), operadorId:opId, periodo, dias});
            Toast.show('Período agregado'); this.render(); Bus.emit();
          }
        });
      });
    });

    // confirmar carga desde el formulario
    const btnCargar = document.getElementById('btnCargarCredito');
    if(btnCargar){
      btnCargar.addEventListener('click', ()=>{
        const opId = document.getElementById('vacOpSel').value;
        const periodo = document.getElementById('vacPeriodoSel').value;
        const dias = parseInt(document.getElementById('vacDiasInput').value)||0;
        if(!opId){ Toast.show('Elegí un operario'); return; }
        if(!dias||dias<=0){ Toast.show('Ingresá una cantidad válida'); return; }
        Modal.open({
          title:'Confirmar carga',
          bodyHTML:`<p>Se cargan <strong>${dias} días</strong> del período <strong>${periodo}</strong> a <strong>${this.esc(Domain.getOperador(opId)?.apellidoNombre||'')}</strong>.</p>`,
          confirmText:'Confirmar',
          onConfirm:()=>{
            const lote = DB.vacacionesCreditos.find(v=> v.operadorId===opId && Domain.loteGetPeriodo(v)===periodo);
            if(lote) lote.dias+=dias;
            else DB.vacacionesCreditos.push({id:'vc_'+Date.now(), operadorId:opId, periodo, dias});
            Toast.show('Crédito cargado'); this.render(); Bus.emit();
          }
        });
      });
    }

    // asignar a todos
    const btnTodos = document.getElementById('btnAsignarATodos');
    if(btnTodos){
      btnTodos.addEventListener('click', ()=>{
        Modal.open({
          title:'Asignar a todos',
          bodyHTML:`
            <p>Se suma la misma cantidad de días a <strong>cada operador</strong> individualmente.</p>
            <div class="field"><label>Período</label>
              <select id="todosPeriodoSel" class="vac-sel">
                ${this.periodosDisponibles().map(p=>`<option value="${p}" ${p===this.periodoDefault()?'selected':''}>${p}</option>`).join('')}
              </select>
            </div>
            <div class="field"><label>Días a sumar (múltiplo de 7)</label>
              <input type="number" id="todosDiasInput" value="14" min="7" step="7">
            </div>`,
          confirmText:'Confirmar asignación masiva',
          onConfirm:(body)=>{
            const periodo = body.querySelector('#todosPeriodoSel').value;
            const dias = parseInt(body.querySelector('#todosDiasInput').value)||7;
            const afectados = Domain.asignarCreditoATodos(dias, periodo);
            Toast.show(`+${dias} días período ${periodo} asignados a ${afectados} operarios`);
            this.render(); Bus.emit();
          }
        });
      });
    }
  }
};
