<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Personal — RRHH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===================== TOKENS ===================== */
:root{
  --navy:#1C2230;
  --navy-soft:#2A3245;
  --paper:#F7F5F0;
  --paper-dim:#EFEBE2;
  --line:#DAD4C5;
  --steel:#3D5A6C;
  --steel-soft:#E3EBED;
  --umber:#8B5A3C;
  --umber-soft:#F0E5DA;
  --amber:#C9A961;
  --amber-soft:#FAF0D8;
  --brick:#B5483D;
  --brick-soft:#F8E2DF;
  --sage:#5A8C6E;
  --sage-soft:#E4EFE8;
  --ink:#1C2230;
  --ink-dim:#6B6557;
  --white:#FFFFFF;

  --f-display:'Archivo',sans-serif;
  --f-body:'IBM Plex Sans',sans-serif;
  --f-mono:'IBM Plex Mono',monospace;

  --radius:6px;
  --shadow-card:0 1px 2px rgba(28,34,48,.06), 0 4px 12px rgba(28,34,48,.05);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:var(--f-body);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}
::selection{background:var(--amber-soft);}

/* visible keyboard focus */
button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, [tabindex]:focus-visible{
  outline:2px solid var(--steel);
  outline-offset:2px;
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
}

/* ===================== SHELL ===================== */
.app-shell{
  display:flex;
  height:100vh;
  width:100vw;
  overflow:hidden;
}

/* ---- Sidebar rail ---- */
.rail{
  width:84px;
  flex:0 0 84px;
  background:var(--navy);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:18px 0 14px;
  position:relative;
  z-index:5;
}
.rail-brand{
  color:var(--amber);
  font-family:var(--f-display);
  font-weight:800;
  font-size:11px;
  letter-spacing:.12em;
  text-align:center;
  line-height:1.3;
  padding-bottom:16px;
  margin-bottom:10px;
  border-bottom:1px solid rgba(255,255,255,.12);
  width:60px;
}
.rail-tabs{
  display:flex;
  flex-direction:column;
  gap:4px;
  width:100%;
  align-items:center;
  flex:1;
}
.rail-tab{
  width:68px;
  background:none;
  border:none;
  color:rgba(255,255,255,.55);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  padding:11px 4px;
  border-radius:var(--radius);
  font-size:10.5px;
  font-weight:600;
  line-height:1.25;
  text-align:center;
  letter-spacing:.01em;
  transition:background .15s, color .15s;
}
.rail-tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7;}
.rail-tab:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85);}
.rail-tab.active{
  background:var(--paper);
  color:var(--navy);
}
.rail-tab.active svg{stroke:var(--navy);}
.rail-foot{
  color:rgba(255,255,255,.3);
  font-size:9px;
  letter-spacing:.06em;
  margin-top:10px;
}

/* ---- Main area ---- */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  min-width:0;
}
.topbar{
  height:60px;
  flex:0 0 60px;
  background:var(--white);
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
}
.topbar h1{
  font-family:var(--f-display);
  font-weight:700;
  font-size:18px;
  margin:0;
  letter-spacing:-.01em;
}
.topbar .sub{
  font-size:12px;
  color:var(--ink-dim);
  margin-top:1px;
}
.topbar-date{
  font-family:var(--f-mono);
  font-size:12.5px;
  color:var(--ink-dim);
  background:var(--paper-dim);
  padding:6px 12px;
  border-radius:var(--radius);
}

.view{
  flex:1;
  overflow:auto;
  padding:24px 28px 40px;
}
.view-hidden{display:none !important;}

/* ===================== SHARED UI ===================== */
.panel{
  background:var(--white);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow-card);
}
.panel-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px;
  border-bottom:1px solid var(--line);
}
.panel-head h2{
  font-family:var(--f-display);
  font-size:13.5px;
  font-weight:700;
  letter-spacing:.04em;
  text-transform:uppercase;
  color:var(--navy);
  margin:0;
}
.panel-head .count{
  font-family:var(--f-mono);
  font-size:11.5px;
  color:var(--ink-dim);
}

.btn{
  border:1px solid var(--line);
  background:var(--white);
  border-radius:5px;
  padding:7px 13px;
  font-size:12.5px;
  font-weight:600;
  color:var(--navy);
  display:inline-flex;
  align-items:center;
  gap:6px;
  transition:background .12s, border-color .12s;
}
.btn:hover{background:var(--paper-dim);}
.btn-primary{
  background:var(--navy);
  border-color:var(--navy);
  color:var(--white);
}
.btn-primary:hover{background:var(--navy-soft);}
.btn-sm{padding:4px 9px;font-size:11.5px;}
.btn-icon{
  width:28px;height:28px;padding:0;
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:5px;border:1px solid var(--line);background:var(--white);
}
.btn-icon:hover{background:var(--paper-dim);}
.btn-icon svg{width:14px;height:14px;}
.btn-danger-ghost{color:var(--brick);border-color:var(--brick-soft);}
.btn-danger-ghost:hover{background:var(--brick-soft);}

.tag{
  display:inline-flex;
  align-items:center;
  font-size:10.5px;
  font-weight:600;
  padding:2px 8px;
  border-radius:20px;
  letter-spacing:.02em;
}
.tag-am{background:var(--steel-soft);color:var(--steel);}
.tag-pm{background:var(--umber-soft);color:var(--umber);}
.tag-coord{background:#EDE6F5;color:#6B4E96;}

input[type=text], input[type=date], input[type=number], input[type=email], textarea, select{
  border:1px solid var(--line);
  border-radius:5px;
  padding:7px 10px;
  font-size:12.5px;
  color:var(--ink);
  background:var(--white);
  width:100%;
}
textarea{resize:vertical;font-family:var(--f-body);}
input::placeholder, textarea::placeholder{color:#A8A296;}

.scroll-x{overflow-x:auto;}
.scroll-x::-webkit-scrollbar{height:10px;}
.scroll-x::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}
.scroll-x::-webkit-scrollbar-track{background:var(--paper-dim);}

.empty-state{
  padding:30px 18px;
  text-align:center;
  color:var(--ink-dim);
  font-size:12.5px;
}

/* toast */
.toast{
  position:fixed;
  bottom:22px;
  left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--navy);
  color:var(--white);
  font-size:12.5px;
  font-weight:500;
  padding:10px 18px;
  border-radius:6px;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  opacity:0;
  pointer-events:none;
  transition:opacity .18s, transform .18s;
  z-index:999;
  display:flex;
  align-items:center;
  gap:8px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast .dot{width:7px;height:7px;border-radius:50%;background:var(--sage);flex:0 0 7px;}

/* modal */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(28,34,48,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
  padding:20px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--white);
  border-radius:8px;
  width:100%;
  max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.modal-head{
  padding:16px 18px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.modal-head h3{margin:0;font-family:var(--f-display);font-size:14.5px;font-weight:700;}
.modal-body{padding:16px 18px;}
.modal-body p{font-size:12.5px;color:var(--ink-dim);margin:0 0 14px;line-height:1.5;}
.modal-foot{
  padding:14px 18px;
  border-top:1px solid var(--line);
  display:flex;
  justify-content:flex-end;
  gap:8px;
}
.field{margin-bottom:12px;}
.field label{
  display:block;
  font-size:11px;
  font-weight:600;
  color:var(--ink-dim);
  text-transform:uppercase;
  letter-spacing:.04em;
  margin-bottom:5px;
}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}

h1,h2,h3{font-family:var(--f-display);}

/* ===================== LOGIN ===================== */
#loginScreen{
  position:fixed; inset:0; background:var(--navy);
  display:flex; align-items:center; justify-content:center;
  z-index:200;
}
#loginScreen.hidden{display:none;}
.login-card{
  background:var(--paper); border-radius:10px; width:100%; max-width:340px;
  padding:32px 28px; box-shadow:0 24px 70px rgba(0,0,0,.4);
}
.login-brand{
  font-family:var(--f-display); font-weight:800; font-size:13px;
  letter-spacing:.1em; color:var(--amber); text-align:center; margin-bottom:4px;
}
.login-title{ text-align:center; font-size:14px; color:var(--ink-dim); margin-bottom:24px; }
.login-card .field{ margin-bottom:14px; }
.login-card label{ display:block; font-size:11px; font-weight:600; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.04em; margin-bottom:5px; }
.login-card input{ width:100%; padding:10px 12px; font-size:13.5px; }
#loginError{

}
#loginError.show{ display:block; }
.login-card button[type=submit]{ width:100%; padding:10px; font-size:13px; margin-top:4px; }
.login-loading{ text-align:center; font-size:12px; color:var(--ink-dim); margin-top:10px; display:none; }

/* indicador de sync / usuario en topbar */
.topbar-user{ display:flex; align-items:center; gap:14px; }
.topbar-user .who{ font-size:12px; color:var(--ink-dim); }
.topbar-user .who strong{ color:var(--ink); }
#btnLogout{ font-size:11.5px; padding:6px 11px; }
#syncStatus{ font-size:10.5px; color:var(--ink-dim); display:flex; align-items:center; gap:5px; }
#syncStatus .sync-dot{ width:6px; height:6px; border-radius:50%; background:var(--sage); }
#syncStatus.syncing .sync-dot{ background:var(--amber); }
</style>

<!-- Firebase SDK (compat — funciona con <script> simple, sin npm/bundler) -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
/* =======================================================================
   data.js
   -----------------------------------------------------------------------
   Modelo de datos en memoria. Esta forma de objetos es la que se debería
   respetar 1 a 1 al migrar a Firestore:

   - DB.operadores   -> colección "operadores"      (doc id = operador.id)
   - DB.eventos      -> colección "eventos"          (doc id = evento.id)
   - DB.compensatorios -> colección "compensatorios" (doc id = comp.id)
   - DB.vacacionesCreditos -> colección "vacacionesCreditos" (doc id = credito.id)
   - DB.asistenciaHoy -> colección "asistencia" (doc id = `${operadorId}_${fecha}`)
   - DB.anotaciones   -> colección "anotaciones"     (doc id = anot.id)
   - DB.notasGenerales -> doc único "notasGenerales/actual"
   ======================================================================= */

/* =======================================================================
   firebase.js — conexión real a Firebase (Auth + Firestore)
   -----------------------------------------------------------------------
   DB sigue siendo el mismo objeto en memoria que usan las 5 vistas
   (DB.operadores, DB.eventos, etc.) — lo que cambia es que ahora se llena
   en vivo desde Firestore (onSnapshot) y, cada vez que Bus.emit() corre
   (ya disparado por las vistas tras cada cambio), se sincroniza de vuelta
   hacia las colecciones correspondientes.
   ======================================================================= */

const firebaseConfig = {
  apiKey: "AIzaSyDpxzMb0aJ0VjuDDuJpjto5hrq9UP-hJfM",
  authDomain: "asistente-rrhh-9f425.firebaseapp.com",
  projectId: "asistente-rrhh-9f425",
  storageBucket: "asistente-rrhh-9f425.firebasestorage.app",
  messagingSenderId: "844224699626",
  appId: "1:844224699626:web:6434fc06e4cdeb1bda8b93"
};

firebase.initializeApp(firebaseConfig);
const fbAuth = firebase.auth();
const fbDb = firebase.firestore();

/* Dominio falso para simular "usuario" en vez de email real.
   Tu compañero ingresa solo el nombre de usuario (ej: "admin") y
   acá se lo convierte en un email interno para Firebase Auth. */
const AUTH_EMAIL_DOMAIN = "rrhh.local";

const COLECCIONES = ["operadores", "eventos", "vacacionesCreditos", "compensatorios", "anotaciones"];

const DB = {
  operadores: [],
  sectores: ["Pruebas", "Estetica", "Guardado", "Ochava", "Coordinacion", "Informatica", "Movimientos", "Redes"],
  eventos: [],
  vacacionesCreditos: [],
  compensatorios: [],
  asistenciaHoy: {},
  operadoresEnAnotaciones: [],
  anotaciones: [],
  notasGenerales: "",
  historialOcultos: [], // ids de eventos que el usuario borró manualmente de la vista de Historial (el evento sigue en el calendario)
};

/* fecha "hoy" real del sistema (YYYY-MM-DD) */
function calcularHoy(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
const HOY = calcularHoy();

/* ---------------- snapshots: Firestore -> DB (lectura en vivo) ---------------- */
let _unsubscribers = [];
let _suppressNextSave = {}; // evita loops de re-guardado al recibir snapshot propio

function iniciarSincronizacion(){
  detenerSincronizacion();

  COLECCIONES.forEach(col=>{
    const unsub = fbDb.collection(col).onSnapshot(snap=>{
      DB[col] = snap.docs.map(d=> ({ id: d.id, ...d.data() }));
      Bus.render && Bus.render();
    }, err=>{
      console.error(`Error sincronizando ${col}:`, err);
      Toast.show(`Error de conexión leyendo "${col}"`);
    });
    _unsubscribers.push(unsub);
  });

  // documentos singleton: config (operadoresEnAnotaciones, notasGenerales, asistenciaHoy)
  const unsubConfig = fbDb.collection("config").doc("general").onSnapshot(doc=>{
    if(doc.exists){
      const data = doc.data();
      DB.operadoresEnAnotaciones = data.operadoresEnAnotaciones || [];
      DB.notasGenerales = data.notasGenerales || "";
      DB.asistenciaHoy = data.asistenciaHoy || {};
      DB.historialOcultos = data.historialOcultos || [];
    }
    Bus.render && Bus.render();
  }, err=>{
    console.error("Error sincronizando config:", err);
  });
  _unsubscribers.push(unsubConfig);
}

function detenerSincronizacion(){
  _unsubscribers.forEach(u=> u());
  _unsubscribers = [];
}

/* ---------------- DB -> Firestore (escritura) ----------------
   Estrategia: cada colección se reescribe completa (batch) cada vez que
   cambia. Para esta escala de datos (decenas de operarios/eventos) es
   simple, segura y evita tener que cablear un método distinto por cada
   tipo de mutación en las 5 vistas. */
let _guardando = false;
async function guardarTodoEnFirestore(){
  if(_guardando) return;
  _guardando = true;
  document.getElementById('syncStatus')?.classList.add('syncing');
  try{
    for(const col of COLECCIONES){
      const batch = fbDb.batch();
      const snap = await fbDb.collection(col).get();
      // borra lo que ya no está en memoria
      snap.docs.forEach(docSnap=>{
        if(!DB[col].find(item=> item.id === docSnap.id)){
          batch.delete(docSnap.ref);
        }
      });
      // upsert de lo que sí está
      DB[col].forEach(item=>{
        const { id, ...rest } = item;
        batch.set(fbDb.collection(col).doc(id), rest);
      });
      await batch.commit();
    }
    await fbDb.collection("config").doc("general").set({
      operadoresEnAnotaciones: DB.operadoresEnAnotaciones,
      notasGenerales: DB.notasGenerales,
      asistenciaHoy: DB.asistenciaHoy,
      historialOcultos: DB.historialOcultos,
    });
  }catch(err){
    console.error("Error guardando en Firestore:", err);
    Toast.show("No se pudo guardar — revisá tu conexión");
  }finally{
    _guardando = false;
    document.getElementById('syncStatus')?.classList.remove('syncing');
  }
}


/* =======================================================================
   app.js — núcleo: router, helpers, toast, modal, bus de eventos
   ======================================================================= */

/* ---------------- BUS DE EVENTOS ----------------
   Las distintas vistas se suscriben a "db:changed" para re-renderizarse
   cuando otra pestaña modifica datos compartidos (ej: Pestaña 4 marca
   ausente -> Pestaña 2 debe repintar la celda de hoy). */
const Bus = {
  listeners: [],
  on(fn){ this.listeners.push(fn); },
  render(){ this.listeners.forEach(fn => fn()); },
  emit(){
    // 1) re-renderiza inmediatamente con el estado local (UI optimista)
    this.render();
    // 2) persiste el nuevo estado en Firestore
    guardarTodoEnFirestore();
  },
};

/* ---------------- HELPERS DE FECHA ---------------- */
const DateUtil = {
  parse(iso){ // 'YYYY-MM-DD' -> Date (local, sin desfasaje horario)
    const [y,m,d] = iso.split('-').map(Number);
    return new Date(y, m-1, d);
  },
  toISO(date){
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  },
  addDays(iso, n){
    const d = this.parse(iso);
    d.setDate(d.getDate()+n);
    return this.toISO(d);
  },
  diffDays(isoA, isoB){ // isoB - isoA en días
    const a = this.parse(isoA), b = this.parse(isoB);
    return Math.round((b-a) / 86400000);
  },
  formatShort(iso){ // '2026-06-23' -> '23/6/26'
    const [y,m,d] = iso.split('-');
    return `${parseInt(d)}/${parseInt(m)}/${y.slice(2)}`;
  },
  formatDDMM(iso){
    const [y,m,d] = iso.split('-');
    return `${parseInt(d)}-${parseInt(m)}`;
  },
  formatLong(iso){
    const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const d = this.parse(iso);
    return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
  },
  daysInMonth(year, monthIndex){ // monthIndex 0-11
    return new Date(year, monthIndex+1, 0).getDate();
  },
  calcAntiguedad(fechaIngresoISO){
    if(!fechaIngresoISO) return '—';
    const ing = this.parse(fechaIngresoISO);
    const hoy = this.parse(HOY);
    let anios = hoy.getFullYear() - ing.getFullYear();
    const cumpleEsteAnio = new Date(hoy.getFullYear(), ing.getMonth(), ing.getDate());
    if(hoy < cumpleEsteAnio) anios--;
    if(anios < 0) anios = 0;
    return anios === 1 ? '1 año' : `${anios} años`;
  }
};

/* ---------------- MODAL GENÉRICO ----------------
   Modal.open({ title, bodyHTML, confirmText, onConfirm, onMount }) */
const Modal = {
  overlay: null,
  ensure(){
    if(this.overlay) return;
    const wrap = document.createElement('div');
    wrap.className = 'modal-overlay';
    wrap.innerHTML = `
      <div class="modal">
        <div class="modal-head">
          <h3 id="modalTitle"></h3>
          <button class="btn-icon" id="modalClose" aria-label="Cerrar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-foot">
          <button class="btn" id="modalCancel">Cancelar</button>
          <button class="btn btn-primary" id="modalConfirm">Confirmar</button>
        </div>
      </div>`;
    document.body.appendChild(wrap);
    this.overlay = wrap;
    wrap.addEventListener('click', (e)=>{ if(e.target === wrap) this.close(); });
    wrap.querySelector('#modalClose').addEventListener('click', ()=> this.close());
    wrap.querySelector('#modalCancel').addEventListener('click', ()=> this.close());
  },
  open({ title, bodyHTML, confirmText='Confirmar', onConfirm, onMount }){
    this.ensure();
    this.overlay.querySelector('#modalTitle').textContent = title;
    this.overlay.querySelector('#modalBody').innerHTML = bodyHTML;
    const confirmBtn = this.overlay.querySelector('#modalConfirm');
    confirmBtn.textContent = confirmText;
    const newBtn = confirmBtn.cloneNode(true);
    confirmBtn.replaceWith(newBtn);
    newBtn.addEventListener('click', ()=>{
      const result = onConfirm ? onConfirm(this.overlay.querySelector('#modalBody')) : true;
      if(result !== false) this.close();
    });
    this.overlay.classList.add('open');
    if(onMount) onMount(this.overlay.querySelector('#modalBody'));
  },
  close(){ if(this.overlay) this.overlay.classList.remove('open'); }
};

/* ---------------- HELPERS DE DOMINIO COMPARTIDOS ---------------- */
const Domain = {
  getOperador(id){ return DB.operadores.find(o=> o.id === id); },

  eventosDeFecha(operadorId, fecha){
    return DB.eventos.filter(e=> e.operadorId === operadorId && e.fecha === fecha);
  },

  // Evento "bloqueante" de una fecha puntual (vacaciones/licencia/ausente) — el primero que matchee
  eventoBloqueante(operadorId, fecha){
    return DB.eventos.find(e=> e.operadorId===operadorId && e.fecha===fecha &&
      (e.tipo==='vacaciones' || e.tipo==='licencia' || e.tipo==='ausente'));
  },

  // Devuelve { tipo, hasta } del bloque consecutivo de un tipo que contiene `fecha`
  bloqueConsecutivo(operadorId, fecha, tipo){
    const fechasDelTipo = new Set(
      DB.eventos.filter(e=> e.operadorId===operadorId && e.tipo===tipo).map(e=> e.fecha)
    );
    if(!fechasDelTipo.has(fecha)) return null;
    let hasta = fecha;
    while(fechasDelTipo.has(DateUtil.addDays(hasta,1))){
      hasta = DateUtil.addDays(hasta,1);
    }
    let desde = fecha;
    while(fechasDelTipo.has(DateUtil.addDays(desde,-1))){
      desde = DateUtil.addDays(desde,-1);
    }
    return { tipo, desde, hasta };
  },

  // Saldo total de vacaciones disponibles (créditos cargados - días ya asignados en calendario)
  saldoVacaciones(operadorId){
    const cargado = DB.vacacionesCreditos
      .filter(v=> v.operadorId===operadorId)
      .reduce((sum,v)=> sum+v.dias, 0);
    const usado = DB.eventos.filter(e=> e.operadorId===operadorId && e.tipo==='vacaciones').length;
    return cargado - usado;
  },

  // Días de vacaciones asignados en el calendario cuya fecha todavía no llegó (pendientes de disfrutar)
  vacacionesPendientesFuturas(operadorId){
    return DB.eventos.filter(e=> e.operadorId===operadorId && e.tipo==='vacaciones' && e.fecha > HOY).length;
  },

  // Lotes de crédito de vacaciones con su saldo restante ya calculado (FIFO por año).
  // Los lotes que llegaron a 0 no se devuelven (desaparecen de la vista, como se pidió).
  lotesVacacionesConSaldo(operadorId){
    const lotes = DB.vacacionesCreditos
      .filter(v=> v.operadorId===operadorId)
      .sort((a,b)=> a.anio-b.anio);
    let usados = DB.eventos.filter(e=> e.operadorId===operadorId && e.tipo==='vacaciones').length;
    const resultado = [];
    for(const lote of lotes){
      const consumidoDeEsteLote = Math.min(usados, lote.dias);
      const restante = lote.dias - consumidoDeEsteLote;
      usados -= consumidoDeEsteLote;
      if(restante > 0){
        resultado.push({ ...lote, restante });
      }
    }
    return resultado;
  },

  // Saldo de francos disponibles (compensatorios aceptados - francos ya tomados)
  saldoFrancos(operadorId){
    const aceptados = DB.compensatorios.filter(c=> c.operadorId===operadorId && c.estado==='aceptado').length;
    const tomados = DB.eventos.filter(e=> e.operadorId===operadorId && e.tipo==='franco').length;
    return aceptados - tomados;
  },

  // Descuenta 1 día de vacaciones del lote más antiguo con saldo > 0. Devuelve true si pudo.
  descontarVacacion(operadorId){
    const lotes = DB.vacacionesCreditos
      .filter(v=> v.operadorId===operadorId)
      .sort((a,b)=> a.anio-b.anio);
    // calculamos cuánto se usó de cada lote en orden, comparando contra eventos ya puestos
    let usados = DB.eventos.filter(e=> e.operadorId===operadorId && e.tipo==='vacaciones').length;
    for(const lote of lotes){
      if(usados < lote.dias){
        // hay margen en este lote para 1 día más implícito (no se modifica el lote, se infiere del conteo)
        return true;
      }
      usados -= lote.dias;
    }
    return false;
  },

  proximosEventos(){
    // genera alertas: próximos a EMPEZAR vacaciones/licencia, y próximos a TERMINAR
    const alerts = [];
    const tipos = ['vacaciones','licencia'];
    for(const tipo of tipos){
      // agrupar eventos por operador en bloques consecutivos
      const porOperador = {};
      DB.eventos.filter(e=> e.tipo===tipo).forEach(e=>{
        (porOperador[e.operadorId] ||= []).push(e.fecha);
      });
      Object.entries(porOperador).forEach(([opId, fechas])=>{
        fechas = [...new Set(fechas)].sort();
        // detectar bloques consecutivos
        let bloque = [fechas[0]];
        const bloques = [];
        for(let i=1;i<fechas.length;i++){
          if(DateUtil.diffDays(fechas[i-1], fechas[i]) === 1){
            bloque.push(fechas[i]);
          } else {
            bloques.push(bloque); bloque=[fechas[i]];
          }
        }
        bloques.push(bloque);
        bloques.forEach(b=>{
          const desde = b[0], hasta = b[b.length-1];
          const op = Domain.getOperador(opId);
          if(!op) return;
          const diffInicio = DateUtil.diffDays(HOY, desde);
          const diffFin = DateUtil.diffDays(HOY, hasta);
          if(diffInicio > 0){
            alerts.push({ dias: diffInicio, texto: `En ${diffInicio} día${diffInicio===1?'':'s'} empiezan ${tipo} de "${op.apellidoNombre}"` });
          } else if(diffInicio <= 0 && diffFin >= 0){
            if(diffFin > 0){
              alerts.push({ dias: diffFin, texto: `En ${diffFin} día${diffFin===1?'':'s'} termina la ${tipo==='licencia'?'licencia':'vacaciones'} de "${op.apellidoNombre}"` });
            }
          }
        });
      });
    }
    alerts.sort((a,b)=> a.dias-b.dias);
    return alerts;
  },

  // Vacaciones que arrancan en el mes calendario siguiente al actual (para el reporte mensual)
  vacacionesDelProximoMes(){
    const hoyDate = DateUtil.parse(HOY);
    let mesObjetivo = hoyDate.getMonth() + 1;
    let anioObjetivo = hoyDate.getFullYear();
    if(mesObjetivo > 11){ mesObjetivo = 0; anioObjetivo++; }

    const porOperador = {};
    DB.eventos.filter(e=> e.tipo==='vacaciones').forEach(e=>{
      (porOperador[e.operadorId] ||= []).push(e.fecha);
    });

    const resultado = [];
    Object.entries(porOperador).forEach(([opId, fechas])=>{
      fechas = [...new Set(fechas)].sort();
      let bloque = [fechas[0]];
      const bloques = [];
      for(let i=1;i<fechas.length;i++){
        if(DateUtil.diffDays(fechas[i-1], fechas[i]) === 1){
          bloque.push(fechas[i]);
        } else {
          bloques.push(bloque); bloque=[fechas[i]];
        }
      }
      bloques.push(bloque);
      bloques.forEach(b=>{
        const desde = b[0], hasta = b[b.length-1];
        const dDesde = DateUtil.parse(desde);
        if(dDesde.getMonth() === mesObjetivo && dDesde.getFullYear() === anioObjetivo){
          const op = Domain.getOperador(opId);
          if(!op) return;
          resultado.push({ operador: op.apellidoNombre, desde, hasta, dias: b.length });
        }
      });
    });
    resultado.sort((a,b)=> a.desde.localeCompare(b.desde));
    return resultado;
  },

  // ---------------- HISTORIAL DE EVENTOS ----------------

  // Agrupa fechas consecutivas de un mismo tipo/operador en bloques {desde, hasta, dias}
  _agruparBloques(fechas){
    fechas = [...new Set(fechas)].sort();
    if(fechas.length === 0) return [];
    let bloque = [fechas[0]];
    const bloques = [];
    for(let i=1;i<fechas.length;i++){
      if(DateUtil.diffDays(fechas[i-1], fechas[i]) === 1) bloque.push(fechas[i]);
      else { bloques.push(bloque); bloque=[fechas[i]]; }
    }
    bloques.push(bloque);
    return bloques.map(b=> ({ desde:b[0], hasta:b[b.length-1], dias:b.length }));
  },

  // Vacaciones cuyo bloque ya terminó (hasta < HOY), agrupadas por operario
  historialVacaciones(){
    const porOperador = {};
    DB.eventos.filter(e=> e.tipo==='vacaciones' && !DB.historialOcultos.includes(e.id))
      .forEach(e=> (porOperador[e.operadorId] ||= []).push(e.fecha));
    const resultado = {};
    Object.entries(porOperador).forEach(([opId, fechas])=>{
      const bloques = this._agruparBloques(fechas).filter(b=> b.hasta < HOY);
      if(bloques.length){
        const ids = bloques.flatMap(b=> {
          const idsDelBloque = [];
          let cur = b.desde;
          while(true){
            const ev = DB.eventos.find(e=> e.operadorId===opId && e.fecha===cur && e.tipo==='vacaciones');
            if(ev) idsDelBloque.push(ev.id);
            if(cur === b.hasta) break;
            cur = DateUtil.addDays(cur, 1);
          }
          return idsDelBloque;
        });
        resultado[opId] = { bloques, ids };
      }
    });
    return resultado;
  },

  // Francos cuya fecha de goce ya pasó, agrupados por operario
  historialFrancos(){
    const porOperador = {};
    DB.eventos.filter(e=> e.tipo==='franco' && e.fecha < HOY && !DB.historialOcultos.includes(e.id))
      .forEach(e=> (porOperador[e.operadorId] ||= []).push(e));
    return porOperador;
  },

  // Contador histórico de ausencias y licencias por operario, con detalle de fechas
  historialAusenciasLicencias(){
    const resultado = {};
    DB.eventos.filter(e=> (e.tipo==='ausente' || e.tipo==='licencia') && e.fecha < HOY && !DB.historialOcultos.includes(e.id))
      .forEach(e=>{
        if(!resultado[e.operadorId]) resultado[e.operadorId] = { ausencias:[], licencias:[] };
        if(e.tipo==='ausente') resultado[e.operadorId].ausencias.push(e);
        else resultado[e.operadorId].licencias.push(e);
      });
    return resultado;
  }
};

    op[field] = e.target.value;
    Toast.show('Cambios guardados');
    if(field === 'fechaIngreso'){
      tr.querySelector('.col-antig').textContent = DateUtil.calcAntiguedad(op.fechaIngreso);

    const id = e.currentTarget.dataset.id;
    const op = Domain.getOperador(id);

    Modal.open({

  onExportar(){
    const ops = [...DB.operadores];
    const comparadores = {
      nombre: (a,b)=> a.apellidoNombre.localeCompare(b.apellidoNombre),
      sector: (a,b)=> (a.sector||'').localeCompare(b.sector||'') || a.apellidoNombre.localeCompare(b.apellidoNombre),
      turno: (a,b)=> (a.turno||'').localeCompare(b.turno||'') || a.apellidoNombre.localeCompare(b.apellidoNombre),
      legajo: (a,b)=> (parseInt(a.legajo)||999999) - (parseInt(b.legajo)||999999),
    };
    ops.sort(comparadores[this.orden] || comparadores.nombre);

    const filas = ops.map(op=> ({
      'Apellido y Nombre': op.apellidoNombre,
      'Dirección': op.direccion || '',
      'Legajo': op.legajo || '',
      'C.U.I.L.': op.cuil || '',

      'Sector': op.sector || '',
      'Correo empresarial': op.correoEmpresarial || '',

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Operadores');

const ViewCalendario = {
  mesActual: null, // {year, monthIndex}
  seleccion: null, // { operadorId, fechas: [iso,...] }
  dragging: false,
  dragOperadorId: null,
  dragStartFecha: null,

  ESTILOS: {
    vacaciones:  { bg:'var(--amber-soft)',  fg:'#8A6D2C', label:(e)=> 'vacaciones' },
    licencia:    { bg:'var(--brick-soft)',  fg:'var(--brick)', label:(e)=> 'licencia' },
    franco:      { bg:'var(--sage-soft)',   fg:'var(--sage)', label:(e)=> e.origenFranco ? `compensó (${DateUtil.formatDDMM(e.origenFranco)})` : 'compensatorio' },
    cambioTurno: { bg:'#2A3245',            fg:'#fff',         label:(e)=> e.turnoCambio === 'Nocturno' ? 'noche' : `cambio a ${e.turnoCambio}` },
    ausente:     { bg:'var(--brick-soft)',  fg:'var(--brick)', label:(e)=> 'ausente' },
    turnoCoord:  { bg:'#EDE6F5',            fg:'#6B4E96',      label:(e)=> e.turnoDia },
  },

  init(){
    const hoyDate = DateUtil.parse(HOY);
    this.mesActual = { year: hoyDate.getFullYear(), monthIndex: hoyDate.getMonth() };
  },

  render(){
    if(!this.mesActual) this.init();
    const el = document.getElementById('view-calendario');
    const { year, monthIndex } = this.mesActual;
    const nDays = DateUtil.daysInMonth(year, monthIndex);
    const fechas = Array.from({length:nDays}, (_,i)=> {
      const d = new Date(year, monthIndex, i+1);
      return DateUtil.toISO(d);
    });
    const nombreMes = DateUtil.parse(fechas[0]).toLocaleDateString('es-AR', { month:'long', year:'numeric' });

    const amOps = DB.operadores.filter(o=> o.turno === 'AM' && o.sector !== 'Coordinacion');
    const pmOps = DB.operadores.filter(o=> o.turno === 'PM' && o.sector !== 'Coordinacion');
    const coordOps = DB.operadores.filter(o=> o.sector === 'Coordinacion');

    el.innerHTML = `
      <div class="cal-toolbar">
        <div class="cal-nav">
          <button class="btn-icon" id="calPrev" aria-label="Mes anterior">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <span class="cal-mes-label">${this.cap(nombreMes)}</span>
          <button class="btn-icon" id="calNext" aria-label="Mes siguiente">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
        <div class="cal-legend">
          <span class="leg-item"><i style="background:var(--amber-soft);border:1px solid var(--amber)"></i>Vacaciones</span>
          <span class="leg-item"><i style="background:var(--brick-soft);border:1px solid var(--brick)"></i>Licencia</span>
          <span class="leg-item"><i style="background:var(--sage-soft);border:1px solid var(--sage)"></i>Compensatorio</span>
          <span class="leg-item"><i style="background:#2A3245"></i>Cambio de turno</span>
        </div>
      </div>

      <div class="cal-block" data-turno="AM">
        <div class="cal-block-head"><span class="tag tag-am">AM</span> Turno mañana</div>
        <div class="scroll-x cal-scroll" id="calScrollAM">
          ${this.gridHTML(amOps, fechas)}
        </div>
      </div>

      <div class="cal-block" data-turno="PM" style="margin-top:18px;">
        <div class="cal-block-head"><span class="tag tag-pm">PM</span> Turno tarde</div>
        <div class="scroll-x cal-scroll" id="calScrollPM">
          ${this.gridHTML(pmOps, fechas)}
        </div>
      </div>

      ${coordOps.length > 0 ? `
      <div class="cal-block" data-turno="COORD" style="margin-top:18px;">
        <div class="cal-block-head"><span class="tag tag-coord">COORD</span> Coordinadores</div>
        <div class="scroll-x cal-scroll" id="calScrollCOORD">
          ${this.gridHTML(coordOps, fechas)}
        </div>
      </div>` : ''}

      <div class="cal-action-panel" id="calActionPanel" style="display:none;"></div>
    `;

    this.injectStyles();
    this.bindToolbar();
    this.bindGrid(el);
    this.syncScroll();
    this.scrollToHoy();
  },

  cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); },

  gridHTML(ops, fechas){
    const colWidth = 78;
    return `
      <table class="cal-table" style="--colw:${colWidth}px;">
        <thead>
          <tr class="cal-hoy-row">
            <td class="cal-namecol"></td>
            ${fechas.map(f=> `<td class="${f===HOY?'is-hoy-marker':''}">${f===HOY?'HOY':''}</td>`).join('')}
          </tr>
          <tr>
            <td class="cal-namecol">Operario</td>
            ${fechas.map(f=>{
              const d = DateUtil.parse(f);
              const diasAbrev = ['dom','lun','mar','mié','jue','vie','sáb'];
              const nombreDia = diasAbrev[d.getDay()];
              const diaLabel = `${d.getDate()}-${d.getMonth()+1}`;
              return `<td class="cal-daycol ${f===HOY?'is-hoy':''}" data-fecha="${f}"><span class="cal-day-name">${nombreDia}</span><span class="cal-day-num">${diaLabel}</span></td>`;
            }).join('')}
          </tr>
        </thead>
        <tbody>
          ${ops.map(op=> this.rowHTML(op, fechas)).join('')}
        </tbody>
      </table>
    `;
  },

  rowHTML(op, fechas){
    return `
      <tr data-operador-id="${op.id}">
        <td class="cal-namecol">${this.esc(op.apellidoNombre)}</td>
        ${fechas.map(f=> this.cellHTML(op.id, f)).join('')}
      </tr>
    `;
  },

  cellHTML(operadorId, fecha){
    const eventosDia = Domain.eventosDeFecha(operadorId, fecha);
    // prioridad: cualquier evento que no sea meramente informativo (turnoCoord) gana la celda
    const ev = eventosDia.find(e=> e.tipo !== 'turnoCoord') || eventosDia[0];
    let style = '', label = '', cls = 'cal-cell';
    if(fecha === HOY) cls += ' is-hoy';
    if(ev){
      const e = this.ESTILOS[ev.tipo];
      if(e){
        style = `background:${e.bg};color:${e.fg};`;
        label = e.label(ev);
        cls += ` cal-cell-evt evt-${ev.tipo}`;
      }
    }
    return `<td class="${cls}" data-operador-id="${operadorId}" data-fecha="${fecha}" style="${style}">${label}</td>`;
  },

  esc(s){ return (s||'').toString().replace(/"/g,'&quot;'); },

  injectStyles(){
    if(document.getElementById('calStyles')) return;
    const style = document.createElement('style');
    style.id = 'calStyles';
    style.textContent = `
      .cal-toolbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
      .cal-nav{ display:flex; align-items:center; gap:10px; }
      .cal-mes-label{ font-family:var(--f-display); font-weight:700; font-size:15px; text-transform:capitalize; min-width:160px; text-align:center; }
      .cal-legend{ display:flex; gap:14px; flex-wrap:wrap; }
      .leg-item{ display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--ink-dim); }

      }

      .cal-action-panel .ap-info strong{ color:#fff; }
      .cal-action-panel button{
        background:rgba(255,255,255,.08); color:#fff; border:1px solid rgba(255,255,255,.18);
        padding:7px 13px; border-radius:6px; font-size:12px; font-weight:600;
      }
      .cal-action-panel button:hover{ background:rgba(255,255,255,.18); }
      .cal-action-panel button.ap-cancel{ background:transparent; border-color:transparent; color:rgba(255,255,255,.55); }
    `;
    document.head.appendChild(style);
  },

  bindToolbar(){
    document.getElementById('calPrev').addEventListener('click', ()=>{
      let { year, monthIndex } = this.mesActual;
      monthIndex--; if(monthIndex<0){ monthIndex=11; year--; }
      this.mesActual = { year, monthIndex };
      this.clearSeleccion();
      this.render();
    });
    document.getElementById('calNext').addEventListener('click', ()=>{
      let { year, monthIndex } = this.mesActual;
      monthIndex++; if(monthIndex>11){ monthIndex=0; year++; }
      this.mesActual = { year, monthIndex };
      this.clearSeleccion();
      this.render();
    });
  },

  syncScroll(){
    // mantiene alineadas las columnas de fecha entre los bloques AM, PM y COORD al hacer scroll horizontal
    const blocks = ['calScrollAM','calScrollPM','calScrollCOORD']
      .map(id=> document.getElementById(id))
      .filter(Boolean);
    if(blocks.length < 2) return;
    let syncing = false;
    blocks.forEach(src=>{
      src.addEventListener('scroll', ()=>{
        if(syncing) return;
        syncing = true;
        blocks.forEach(other=>{ if(other !== src) other.scrollLeft = src.scrollLeft; });
        syncing = false;
      });
    });
  },

  scrollToHoy(){
    // enfoca automáticamente la columna de HOY al abrir/cambiar de mes, si está dentro del mes visible
    requestAnimationFrame(()=>{
      const blocks = ['calScrollAM','calScrollPM','calScrollCOORD']
        .map(id=> document.getElementById(id))
        .filter(Boolean);
      const first = blocks[0];
      if(!first) return;
      const hoyCell = first.querySelector(`.cal-daycol[data-fecha="${HOY}"]`);
      if(!hoyCell) return;
      const targetLeft = Math.max(0, hoyCell.offsetLeft - first.clientWidth/2 + hoyCell.clientWidth/2);
      blocks.forEach(b=> b.scrollLeft = targetLeft);
    });
  },

  bindGrid(root){
    root.querySelectorAll('.cal-cell').forEach(cell=>{
      cell.addEventListener('mousedown', (e)=> this.onCellMouseDown(e));
      cell.addEventListener('mouseenter', (e)=> this.onCellMouseEnter(e));
    });
    document.addEventListener('mouseup', this._mouseUpHandler || (this._mouseUpHandler = ()=> this.onMouseUp()));
  },

  onCellMouseDown(e){
    e.preventDefault();
    this.dragging = true;
    this.dragOperadorId = e.currentTarget.dataset.operadorId;
    this.dragStartFecha = e.currentTarget.dataset.fecha;
    this.paintSelectionRange(this.dragOperadorId, this.dragStartFecha, this.dragStartFecha);
  },

  onCellMouseEnter(e){
    if(!this.dragging) return;
    if(e.currentTarget.dataset.operadorId !== this.dragOperadorId) return; // no cruzar de fila
    this.paintSelectionRange(this.dragOperadorId, this.dragStartFecha, e.currentTarget.dataset.fecha);
  },

  onMouseUp(){
    if(!this.dragging) return;
    this.dragging = false;
    if(this.seleccion && this.seleccion.fechas.length){
      this.showActionPanel();
    }
  },

  paintSelectionRange(operadorId, fechaA, fechaB){
    document.querySelectorAll('.cal-cell.is-selecting').forEach(c=> c.classList.remove('is-selecting'));
    let [desde, hasta] = [fechaA, fechaB];
    if(DateUtil.diffDays(desde, hasta) < 0) [desde, hasta] = [hasta, desde];
    const fechas = [];
    let cur = desde;
    while(true){
      fechas.push(cur);
      if(cur === hasta) break;
      cur = DateUtil.addDays(cur, 1);
    }
    fechas.forEach(f=>{
      const cell = document.querySelector(`.cal-cell[data-operador-id="${operadorId}"][data-fecha="${f}"]`);
      if(cell) cell.classList.add('is-selecting');
    });
    this.seleccion = { operadorId, fechas };
  },

  clearSeleccion(){
    document.querySelectorAll('.cal-cell.is-selecting').forEach(c=> c.classList.remove('is-selecting'));
    this.seleccion = null;
    const panel = document.getElementById('calActionPanel');
    if(panel) panel.style.display = 'none';
  },

  showActionPanel(){
    const panel = document.getElementById('calActionPanel');
    if(!panel) return;
    const { operadorId, fechas } = this.seleccion;
    const op = Domain.getOperador(operadorId);
    const n = fechas.length;
    const saldoVac = Domain.saldoVacaciones(operadorId);
    const saldoFr = Domain.saldoFrancos(operadorId);
    const esCoordinador = op.sector === 'Coordinacion';

    panel.style.display = 'flex';
    panel.innerHTML = `
      <div class="ap-info"><strong>${this.esc(op.apellidoNombre)}</strong><br>${n} día${n===1?'':'s'} seleccionado${n===1?'':'s'}</div>
      <button data-action="vacaciones" title="Saldo disponible: ${saldoVac} días">Vacaciones (${saldoVac} disp.)</button>
      <button data-action="licencia">Licencia</button>
      <button data-action="franco" ${saldoFr<=0 ? 'disabled style="opacity:.4;cursor:not-allowed;"':''} title="Saldo disponible: ${saldoFr} compensatorios">Compensatorio (${saldoFr} disp.)</button>
      <button data-action="cambioTurno">Cambio de turno</button>
      ${esCoordinador ? `<button data-action="turnoCoord">Turno del día</button>` : ''}
      <button data-action="limpiar" style="background:rgba(181,72,61,.25);border-color:rgba(181,72,61,.4);">Borrar selección</button>
      <button class="ap-cancel" data-action="cancelar">Cancelar</button>
    `;
    panel.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click', ()=> this.onActionClick(btn.dataset.action));
    });
  },

  onActionClick(action){
    const { operadorId, fechas } = this.seleccion;
    const op = Domain.getOperador(operadorId);

    if(action === 'cancelar'){ this.clearSeleccion(); this.render(); return; }

    if(action === 'limpiar'){
      DB.eventos = DB.eventos.filter(e=> !(e.operadorId===operadorId && fechas.includes(e.fecha)));
      Toast.show('Selección borrada');
      this.clearSeleccion();
      this.render();
      Bus.emit();
      return;
    }

    if(action === 'vacaciones'){
      const saldo = Domain.saldoVacaciones(operadorId);
      if(fechas.length > saldo){
        Modal.open({
          title:'Saldo insuficiente',
          bodyHTML:`<p><strong>${this.esc(op.apellidoNombre)}</strong> tiene <strong>${saldo}</strong> día${saldo===1?'':'s'} disponible${saldo===1?'':'s'} de vacaciones, pero seleccionaste ${fechas.length}. Cargá más días en la pestaña "Vacaciones y francos" o reducí la selección.</p>`,
          confirmText:'Entendido',
          onConfirm:()=> true
        });
        return;
      }
      DB.eventos = DB.eventos.filter(e=> !(e.operadorId===operadorId && fechas.includes(e.fecha)));
      fechas.forEach(f=> DB.eventos.push({ id:'ev_'+Date.now()+'_'+f, operadorId, fecha:f, tipo:'vacaciones' }));
      Toast.show(`Vacaciones asignadas (descuenta desde el año más antiguo)`);
      this.clearSeleccion();
      this.render();
      Bus.emit();
      return;
    }

    if(action === 'licencia'){
      DB.eventos = DB.eventos.filter(e=> !(e.operadorId===operadorId && fechas.includes(e.fecha)));
      fechas.forEach(f=> DB.eventos.push({ id:'ev_'+Date.now()+'_'+f, operadorId, fecha:f, tipo:'licencia' }));
      Toast.show('Licencia registrada');
      this.clearSeleccion();
      this.render();
      Bus.emit();
      return;
    }

    if(action === 'franco'){
      const saldo = Domain.saldoFrancos(operadorId);
      if(saldo <= 0){ Toast.show('No hay francos disponibles para asignar'); return; }
      if(fechas.length > 1){
        Toast.show('Seleccioná un solo día para asignar un franco');
        return;
      }
      // pedir la fecha de origen (día a favor) entre los compensatorios aceptados sin usar
      const disponibles = DB.compensatorios.filter(c=> c.operadorId===operadorId && c.estado==='aceptado');
      this.openFrancoModal(operadorId, fechas[0], disponibles);
      return;
    }

    if(action === 'cambioTurno'){
      this.openCambioTurnoModal(operadorId, fechas);
      return;
    }

    if(action === 'turnoCoord'){
      this.openTurnoCoordModal(operadorId, fechas);
      return;
    }
  },

  openFrancoModal(operadorId, fecha, disponibles){
    Modal.open({
      title:'Asignar compensatorio',
      bodyHTML:`
        <p>Elegí a qué compensatorio en noción corresponde este día de goce para <strong>${this.esc(Domain.getOperador(operadorId).apellidoNombre)}</strong> el día ${DateUtil.formatShort(fecha)}.</p>
        <div class="field">
          <label>Compensatorio en noción de</label>
          <select id="francoOrigenSel">
            ${disponibles.map(c=> `<option value="${c.id}">${c.diaAFavor ? DateUtil.formatShort(c.diaAFavor) : 'Sin fecha (asignación voluntaria)'}</option>`).join('')}
          </select>
        </div>
      `,
      confirmText:'Asignar compensatorio',
      onConfirm:(body)=>{
        const compId = body.querySelector('#francoOrigenSel').value;
        const comp = DB.compensatorios.find(c=> c.id===compId);
        DB.eventos = DB.eventos.filter(e=> !(e.operadorId===operadorId && e.fecha===fecha));
        DB.eventos.push({ id:'ev_'+Date.now(), operadorId, fecha, tipo:'franco', origenFranco: comp ? comp.diaAFavor : '' });
        if(comp) comp.estado = 'usado';
        Toast.show('Compensatorio asignado');
        this.clearSeleccion();
        this.render();
        Bus.emit();
      }
    });
  },

  openTurnoCoordModal(operadorId, fechas){
    Modal.open({
      title:'Turno del día — Coordinador',
      bodyHTML:`
        <p>Anotá qué turno cubrió este coordinador en los días seleccionados (solo a fines informativos, no afecta saldos).</p>
        <div class="field">
          <label>Turno</label>
          <select id="turnoCoordSel">
            <option value="AM">AM</option>
            <option value="PM">PM</option>
            <option value="Rotativo">Rotativo</option>
          </select>
        </div>
      `,
      confirmText:'Guardar',
      onConfirm:(body)=>{
        const turnoDia = body.querySelector('#turnoCoordSel').value;
        DB.eventos = DB.eventos.filter(e=> !(e.operadorId===operadorId && fechas.includes(e.fecha) && e.tipo==='turnoCoord'));
        fechas.forEach(f=> DB.eventos.push({ id:'ev_'+Date.now()+'_'+f, operadorId, fecha:f, tipo:'turnoCoord', turnoDia }));
        Toast.show('Turno del día guardado');
        this.clearSeleccion();
        this.render();
        Bus.emit();
      }
    });
  },

  openCambioTurnoModal(operadorId, fechas){
    Modal.open({
      title:'Cambio de turno',
      bodyHTML:`
        <p>Asignar cambio de horario para los días seleccionados. El operario se mantiene en su fila y cuadro original.</p>
        <div class="field">
          <label>Nuevo turno para esos días</label>
          <select id="turnoCambioSel">
            <option value="AM">AM</option>
            <option value="PM">PM</option>
            <option value="Nocturno">Nocturno</option>
          </select>
        </div>
      `,
      confirmText:'Aplicar',
      onConfirm:(body)=>{
        const turnoCambio = body.querySelector('#turnoCambioSel').value;
        DB.eventos = DB.eventos.filter(e=> !(e.operadorId===operadorId && fechas.includes(e.fecha)));
        fechas.forEach(f=> DB.eventos.push({ id:'ev_'+Date.now()+'_'+f, operadorId, fecha:f, tipo:'cambioTurno', turnoCambio }));
        Toast.show('Cambio de turno aplicado');
        this.clearSeleccion();
        this.render();
        Bus.emit();
      }
    });
  }
};

    this.injectStyles();

  },

  vacacionesEsteMes(){
    const hoyDate = DateUtil.parse(HOY);
    const mes = hoyDate.getMonth(), anio = hoyDate.getFullYear();
    const porOperador = {};
    DB.eventos.filter(e=> e.tipo==='vacaciones').forEach(e=>{
      (porOperador[e.operadorId] ||= []).push(e.fecha);
    });
    const resultado = [];
    Object.entries(porOperador).forEach(([opId, fechas])=>{
      fechas = [...new Set(fechas)].sort();
      let bloque = [fechas[0]];
      const bloques = [];
      for(let i=1;i<fechas.length;i++){
        if(DateUtil.diffDays(fechas[i-1], fechas[i]) === 1) bloque.push(fechas[i]);
        else { bloques.push(bloque); bloque=[fechas[i]]; }
      }
      bloques.push(bloque);
      bloques.forEach(b=>{
        const desde = b[0];
        const d = DateUtil.parse(desde);
        if(d.getMonth() === mes && d.getFullYear() === anio){
          const op = Domain.getOperador(opId);
          if(op) resultado.push({ operador: op.apellidoNombre, desde, hasta: b[b.length-1], dias: b.length });
        }
      });
    });
    resultado.sort((a,b)=> a.desde.localeCompare(b.desde));
    return resultado;
  },

        this.compOperadorSeleccionado = e.target.value;
        this.render();
      });
    }
    const btnAgregar = document.getElementById('btnAgregarCompensatorio');
    if(btnAgregar){
      btnAgregar.addEventListener('click', ()=>{
        if(!this.compOperadorSeleccionado) return;
        DB.compensatorios.push({
          id:'c_'+Date.now(), operadorId:this.compOperadorSeleccionado,
          diaAFavor:HOY, sinFecha:false, diaSolicitado:'', estado:'pendiente'
        });
        Toast.show('Compensatorio cargado');
        this.render();
        Bus.emit();
      });
    }

    el.querySelectorAll('[data-comp-field]').forEach(input=>{
      input.addEventListener('change', (e)=>{
        const comp = DB.compensatorios.find(c=> c.id === e.target.dataset.compId);
        if(!comp) return;
        const field = e.target.dataset.compField;
        if(field === 'sinFecha'){
          comp.sinFecha = e.target.checked;
          if(comp.sinFecha) comp.diaAFavor = '';
        } else {
          comp[field] = e.target.value;
        }
        Toast.show('Compensatorio actualizado');
        if(field === 'estado' || field === 'sinFecha'){
          this.render();
          Bus.emit();
        }
      });
    });
    el.querySelectorAll('.row-delete-comp').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        DB.compensatorios = DB.compensatorios.filter(c=> c.id !== e.currentTarget.dataset.compId);
        Toast.show('Registro eliminado');
        this.render();
        Bus.emit();
      });
    });

    el.querySelectorAll('[data-credito-field]').forEach(input=>{
      input.addEventListener('change', (e)=>{
        const credito = DB.vacacionesCreditos.find(c=> c.id === e.target.dataset.creditoId);
        if(!credito) return;
        const field = e.target.dataset.creditoField;
        credito[field] = field==='anio' || field==='dias' ? parseInt(e.target.value)||0 : e.target.value;
        this.render();
        Bus.emit();
      });
    });
    el.querySelectorAll('.chip-del').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        DB.vacacionesCreditos = DB.vacacionesCreditos.filter(c=> c.id !== e.currentTarget.dataset.creditoId);
        Toast.show('Lote de vacaciones eliminado');
        this.render();
        Bus.emit();
      });
    });
    el.querySelectorAll('[data-action="add-credito"]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const opId = e.currentTarget.dataset.id;
        const anioActual = DateUtil.parse(HOY).getFullYear();
        DB.vacacionesCreditos.push({ id:'vc_'+Date.now(), operadorId:opId, anio:anioActual, dias:7 });
        this.render();
        Bus.emit();
      });
    });
  }
};

            }
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2>Vacaciones del mes</h2>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="count">${vacMes.length} programada${vacMes.length===1?'':'s'}</span>
              ${vacMes.length > 0 ? `<button class="btn btn-sm" id="btnExportarVacMes">Exportar Excel</button>` : ''}
            </div>
          </div>
          <div class="hoy-alerts">
            ${vacMes.length === 0
              ? `<div class="empty-state">Todavía no hay vacaciones asignadas para el mes próximo.</div>`
              : vacMes.map(v=> `<div class="hoy-alert-item"><span class="alert-dot" style="background:var(--amber);"></span><strong>${this.esc(v.operador)}</strong> — del ${DateUtil.formatShort(v.desde)} al ${DateUtil.formatShort(v.hasta)} (${v.dias} día${v.dias===1?'':'s'})</div>`).join('')
            }
          </div>
        </div>

    document.getElementById('hoyListPM').innerHTML = this.listHTML(pmOps);

    if(btnExp) btnExp.addEventListener('click', ()=> this.onExportarVacMes(vacMes));
  },

  listHTML(ops){
    if(ops.length === 0) return `<div class="empty-state">Sin operarios en este turno.</div>`;
    return `
      <table class="hoy-table">
        <tbody>
          ${ops.map(op=> this.rowHTML(op)).join('')}
        </tbody>
      </table>
    `;
  },

  rowHTML(op){
    // Solo vacaciones y licencia bloquean la fila (ausente sigue permitiendo togglear el switch)
    const bloqueante = DB.eventos.find(e=> e.operadorId===op.id && e.fecha===HOY &&
      (e.tipo==='vacaciones' || e.tipo==='licencia'));
    if(bloqueante){
      const bloque = Domain.bloqueConsecutivo(op.id, HOY, bloqueante.tipo);
      const etiquetaTipo = bloqueante.tipo === 'vacaciones' ? 'vacaciones' : 'licencia';
      const hastaTxt = bloque ? ` hasta ${DateUtil.formatDDMM(bloque.hasta)}-${DateUtil.parse(bloque.hasta).getFullYear()}` : '';
      const claseTipo = bloqueante.tipo === 'vacaciones' ? 'estado-vacaciones' : 'estado-licencia';
      return `
        <tr class="hoy-row is-blocked">
          <td class="col-nombre">${this.esc(op.apellidoNombre)}</td>
          <td class="col-estado ${claseTipo}">${etiquetaTipo}${hastaTxt}</td>
        </tr>
      `;
    }
    // franco con fecha de goce hoy también bloquea solo el día
    const franco = DB.eventos.find(e=> e.operadorId===op.id && e.fecha===HOY && e.tipo==='franco');
    if(franco){
      return `
        <tr class="hoy-row is-blocked">
          <td class="col-nombre">${this.esc(op.apellidoNombre)}</td>
          <td class="col-estado estado-licencia" style="background:var(--sage-soft);color:var(--sage);">compensatorio</td>
        </tr>
      `;
    }

    const asistKey = `${op.id}_${HOY}`;
    const estado = DB.asistenciaHoy[asistKey] || 'presente';
    return `
      <tr class="hoy-row">
        <td class="col-nombre">${this.esc(op.apellidoNombre)}</td>
        <td class="col-estado">
          <div class="asist-switch" data-operador-id="${op.id}">
            <button class="asist-btn ${estado==='presente'?'is-active presente':''}" data-estado="presente">Presente</button>
            <button class="asist-btn ${estado==='ausente'?'is-active ausente':''}" data-estado="ausente">Ausente</button>
          </div>
        </td>
      </tr>
    `;
  },

  esc(s){ return (s||'').toString().replace(/"/g,'&quot;'); },

  onExportarVacMes(vacMes){
    const filas = vacMes.map(v=> ({
      'Operario': v.operador,
      'Desde': v.desde,
      'Hasta': v.hasta,
      'Días': v.dias,
    }));
    const ws = XLSX.utils.json_to_sheet(filas);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Vacaciones del mes');
    XLSX.writeFile(wb, `vacaciones_proximo_mes_${HOY}.xlsx`);
    Toast.show('Excel exportado');
  },

  injectStyles(){
    if(document.getElementById('hoyStyles')) return;
    const style = document.createElement('style');
    style.id = 'hoyStyles';
    style.textContent = `
      .hoy-fecha-bar{ display:flex; align-items:center; gap:8px; font-family:var(--f-mono); font-size:12.5px; color:var(--ink-dim); margin-bottom:16px; text-transform:capitalize; }
      .hoy-cols{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
      @media (max-width:880px){ .hoy-cols{ grid-template-columns:1fr; } }

      .hoy-table{ width:100%; border-collapse:collapse; }

      .hoy-row:last-child td{ border-bottom:none; }
      .hoy-row .col-nombre{ font-weight:600; width:55%; font-size:11.7px; }
      .hoy-row.is-blocked .col-nombre{ color:var(--ink-dim); }
      .col-estado{ text-align:right; }
      .estado-vacaciones, .estado-licencia{
        display:inline-block; font-size:10.5px; font-weight:600; padding:3px 9px; border-radius:20px;
      }
      .estado-vacaciones{ background:var(--amber-soft); color:#8A6D2C; }
      .estado-licencia{ background:var(--brick-soft); color:var(--brick); }

      .asist-switch{ display:inline-flex; border:1px solid var(--line); border-radius:20px; overflow:hidden; }
      .asist-btn{ border:none; background:var(--white); padding:4px 12px; font-size:10.5px; font-weight:600; color:var(--ink-dim); transition:background .12s,color .12s; cursor:pointer; }
      .asist-btn.is-active.presente{ background:var(--sage); color:#fff; }
      .asist-btn.is-active.ausente{ background:var(--brick); color:#fff; }

      .hoy-alerts{ padding:6px 0; }
      .hoy-alert-item{ display:flex; align-items:center; gap:10px; padding:10px 18px; font-size:12.8px; border-bottom:1px solid #EEEAE0; }
      .hoy-alert-item:last-child{ border-bottom:none; }
      .alert-dot{ width:6px; height:6px; border-radius:50%; background:var(--steel); flex:0 0 6px; }
    `;
    document.head.appendChild(style);
  },

  bindSwitches(el){
    el.querySelectorAll('.asist-switch').forEach(group=>{
      group.querySelectorAll('.asist-btn').forEach(btn=>{
        btn.addEventListener('click', ()=> this.onToggleAsistencia(group.dataset.operadorId, btn.dataset.estado));
      });
    });
  },

  onToggleAsistencia(operadorId, estado){
    const key = `${operadorId}_${HOY}`;
    DB.asistenciaHoy[key] = estado;

    // impacta en el calendario: pinta o borra la celda de "ausente" para hoy
    DB.eventos = DB.eventos.filter(e=> !(e.operadorId===operadorId && e.fecha===HOY && e.tipo==='ausente'));
    if(estado === 'ausente'){
      DB.eventos.push({ id:'ev_aus_'+operadorId, operadorId, fecha:HOY, tipo:'ausente' });
    }

    const op = Domain.getOperador(operadorId);
    Toast.show(`${op ? op.apellidoNombre : 'Operario'} marcado como ${estado}`);
    this.render();
    Bus.emit();
  }
};

    el.querySelectorAll('[data-action="edit-card"]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const tarjeta = DB.anotaciones.find(a=> a.id === e.currentTarget.dataset.id);
        if(tarjeta) this.openCardModal(tarjeta.operadorId, tarjeta);
      });
    });
    el.querySelectorAll('[data-action="del-card"]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        DB.anotaciones = DB.anotaciones.filter(a=> a.id !== e.currentTarget.dataset.id);
        Toast.show('Anotación eliminada');
        this.render();
      });
    });
    el.querySelectorAll('.an-op-remove').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const id = e.currentTarget.dataset.id;
        DB.operadoresEnAnotaciones = DB.operadoresEnAnotaciones.filter(x=> x !== id);
        Toast.show('Operario quitado de la lista');
        this.render();
      });
    });
    const addSel = document.getElementById('anAddOperadorSel');
    if(addSel){
      addSel.addEventListener('change', (e)=>{
        if(!e.target.value) return;
        DB.operadoresEnAnotaciones.push(e.target.value);
        this.render();
      });
    }
    const notas = document.getElementById('anNotasGenerales');
    if(notas){
      let timer;
      notas.addEventListener('input', ()=>{
        clearTimeout(timer);
        timer = setTimeout(()=>{
          DB.notasGenerales = notas.value;
          Toast.show('Notas guardadas');
        }, 600);
      });
    }
  },

  openCardModal(operadorId, tarjetaExistente){
    const op = Domain.getOperador(operadorId);
    Modal.open({
      title: tarjetaExistente ? 'Editar anotación' : 'Nueva anotación',
      bodyHTML:`
        <p>Para <strong>${this.esc(op ? op.apellidoNombre : '')}</strong></p>
        <div class="field">
          <label>Texto de la solicitud / novedad</label>
          <textarea id="cardTextoInput" rows="3" placeholder="Ej: solicitó zapatos de trabajo">${this.esc(tarjetaExistente ? tarjetaExistente.texto : '')}</textarea>
        </div>
      `,
      confirmText: tarjetaExistente ? 'Guardar cambios' : 'Agregar tarjeta',
      onConfirm:(body)=>{
        const texto = body.querySelector('#cardTextoInput').value.trim();
        if(!texto) return false;
        if(tarjetaExistente){
          tarjetaExistente.texto = texto;
          Toast.show('Anotación actualizada');
        } else {
          DB.anotaciones.push({ id:'an_'+Date.now(), operadorId, texto, fecha: HOY });
          Toast.show('Anotación agregada');
        }
        this.render();
      }
    });
  }
};

Router.renderers.anotaciones = () => ViewAnotaciones.render();

/* =======================================================================
   view-historial.js — PESTAÑA NUEVA: Historial de eventos
   ======================================================================= */

const ViewHistorial = {

  render(){
    const el = document.getElementById('view-historial');
    const histVac = Domain.historialVacaciones();
    const histFr = Domain.historialFrancos();
    const histAus = Domain.historialAusenciasLicencias();

    const opsConVac = Object.keys(histVac).map(id=> Domain.getOperador(id)).filter(Boolean);
    const opsConFr = Object.keys(histFr).map(id=> Domain.getOperador(id)).filter(Boolean);
    const opsConAus = Object.keys(histAus).map(id=> Domain.getOperador(id)).filter(Boolean);

    el.innerHTML = `
      <div class="hist-cols">
        <div class="panel">
          <div class="panel-head"><h2>Compensatorios tomados</h2><span class="count">${opsConFr.length} operario${opsConFr.length===1?'':'s'}</span></div>
          <div class="scroll-x">
            ${opsConFr.length === 0 ? `<div class="empty-state">Todavía no hay compensatorios con fecha de goce vencida.</div>` : `
            <table class="hist-table">
              <thead><tr><th>Operario</th><th>Asignado el</th><th>Tomó el</th><th></th></tr></thead>
              <tbody>
                ${opsConFr.map(op=> this.francoRowsHTML(op, histFr[op.id])).join('')}
              </tbody>
            </table>`}
          </div>
        </div>

        <div class="panel">
          <div class="panel-head"><h2>Vacaciones ya disfrutadas</h2><span class="count">${opsConVac.length} operario${opsConVac.length===1?'':'s'}</span></div>
          <div class="scroll-x">
            ${opsConVac.length === 0 ? `<div class="empty-state">Todavía no hay vacaciones con fecha de regreso vencida.</div>` : `
            <table class="hist-table">
              <thead><tr><th>Operario</th><th>Fecha</th><th>Días</th><th></th></tr></thead>
              <tbody>
                ${opsConVac.map(op=> this.vacRowsHTML(op, histVac[op.id])).join('')}
              </tbody>
            </table>`}
          </div>
        </div>
      </div>

      <div class="panel" style="margin-top:18px;">
        <div class="panel-head"><h2>Ausencias y licencias — contador histórico</h2><span class="count">${opsConAus.length} operario${opsConAus.length===1?'':'s'}</span></div>
        <div class="scroll-x">
          ${opsConAus.length === 0 ? `<div class="empty-state">Todavía no hay ausencias o licencias registradas en el pasado.</div>` : `
          <table class="hist-table">
            <thead><tr><th>Operario</th><th>Ausencias</th><th>Licencias</th><th></th></tr></thead>
            <tbody>
              ${opsConAus.map(op=> this.ausRowHTML(op, histAus[op.id])).join('')}
            </tbody>
          </table>`}
        </div>
      </div>
    `;

    this.injectStyles();
    this.bindEvents(el);
  },

  francoRowsHTML(op, data){
    const eventos = data; // array de eventos tipo franco
    return eventos.map((e,i)=> `
      <tr data-evento-id="${e.id}">
        <td class="col-nombre">${i===0 ? this.esc(op.apellidoNombre) : ''}</td>
        <td>${e.origenFranco ? DateUtil.formatShort(e.origenFranco) : 'Sin fecha'}</td>
        <td>${DateUtil.formatShort(e.fecha)}</td>
        <td>
          <button class="btn-icon row-delete-hist" data-evento-id="${e.id}" title="Quitar del historial" aria-label="Quitar del historial">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--brick)" stroke-width="2"><path d="M4 7h16M9 7V4h6v3M6 7l1 14h10l1-14"/></svg>
          </button>
        </td>
      </tr>
    `).join('');
  },

  vacRowsHTML(op, data){
    const { bloques, ids } = data;
    return bloques.map((b,i)=> `
      <tr data-bloque-ids="${ids.join(',')}">
        <td class="col-nombre">${i===0 ? this.esc(op.apellidoNombre) : ''}</td>
        <td>del ${DateUtil.formatShort(b.desde)} al ${DateUtil.formatShort(b.hasta)}</td>
        <td>${b.dias}</td>
        <td>
          ${i===0 ? `<button class="btn-icon row-delete-hist-bloque" data-ids="${ids.join(',')}" title="Quitar del historial" aria-label="Quitar del historial">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--brick)" stroke-width="2"><path d="M4 7h16M9 7V4h6v3M6 7l1 14h10l1-14"/></svg>
          </button>` : ''}
        </td>
      </tr>
    `).join('');
  },

  ausRowHTML(op, data){
    const rowId = 'hist-aus-' + op.id;
    return `
      <tr>
        <td class="col-nombre">${this.esc(op.apellidoNombre)}</td>
        <td>
          <button class="hist-counter" data-toggle="${rowId}-aus">${data.ausencias.length} ausencia${data.ausencias.length===1?'':'s'}</button>
        </td>
        <td>
          <button class="hist-counter" data-toggle="${rowId}-lic">${data.licencias.length} licencia${data.licencias.length===1?'':'s'}</button>
        </td>
        <td></td>
      </tr>
      <tr id="${rowId}-aus" class="hist-detail-row" style="display:none;">
        <td></td>
        <td colspan="3">
          ${data.ausencias.length === 0 ? '<span class="hint-text">Sin ausencias registradas</span>' :
            data.ausencias.map(e=> `<span class="hist-detail-chip">${DateUtil.formatShort(e.fecha)} <button class="chip-del" data-evento-id="${e.id}" data-action="del-evento">×</button></span>`).join(' ')}
        </td>
      </tr>
      <tr id="${rowId}-lic" class="hist-detail-row" style="display:none;">
        <td></td>
        <td colspan="3">
          ${data.licencias.length === 0 ? '<span class="hint-text">Sin licencias registradas</span>' :
            data.licencias.map(e=> `<span class="hist-detail-chip">${DateUtil.formatShort(e.fecha)} <button class="chip-del" data-evento-id="${e.id}" data-action="del-evento">×</button></span>`).join(' ')}
        </td>
      </tr>
    `;
  },

  esc(s){ return (s||'').toString().replace(/"/g,'&quot;'); },

  injectStyles(){
    if(document.getElementById('histStyles')) return;
    const style = document.createElement('style');
    style.id = 'histStyles';
    style.textContent = `
      .hist-cols{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
      @media (max-width:980px){ .hist-cols{ grid-template-columns:1fr; } }

      .hist-table{ border-collapse:collapse; width:100%; font-size:12px; }
      .hist-table th, .hist-table td{ border-bottom:1px solid #EEEAE0; border-right:1px solid #EEEAE0; padding:7px 10px; text-align:left; }
      .hist-table thead th{ background:var(--paper-dim); font-weight:600; font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; color:var(--ink-dim); }
      .hist-table td.col-nombre{ font-weight:600; min-width:170px; }

      .hist-counter{ background:var(--paper-dim); border:1px solid var(--line); border-radius:20px; padding:4px 11px; font-size:11.5px; font-weight:600; color:var(--ink); cursor:pointer; }
      .hist-counter:hover{ background:var(--steel-soft); border-color:var(--steel); }
      .hist-detail-row td{ background:#FBFAF7; padding:8px 10px; }
      .hist-detail-chip{ display:inline-flex; align-items:center; gap:5px; background:var(--white); border:1px solid var(--line); border-radius:14px; padding:3px 4px 3px 10px; font-family:var(--f-mono); font-size:11px; margin:2px 4px 2px 0; }
      .hint-text{ font-size:11px; color:var(--ink-dim); font-style:italic; }
    `;
    document.head.appendChild(style);
  },

  bindEvents(el){
    el.querySelectorAll('.row-delete-hist').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const id = e.currentTarget.dataset.eventoId;
        Modal.open({
          title:'Quitar del historial',
          bodyHTML:`<p>Este registro se va a ocultar del historial. El evento sigue marcado en el Calendario.</p>`,
          confirmText:'Quitar',
          onConfirm:()=>{
            DB.historialOcultos.push(id);
            Toast.show('Registro quitado del historial');
            this.render();
            Bus.emit();
          }
        });
      });
    });
    el.querySelectorAll('.row-delete-hist-bloque').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const ids = e.currentTarget.dataset.ids.split(',');
        Modal.open({
          title:'Quitar del historial',
          bodyHTML:`<p>Este bloque de vacaciones se va a ocultar del historial (${ids.length} día${ids.length===1?'':'s'}). El evento sigue marcado en el Calendario.</p>`,
          confirmText:'Quitar',
          onConfirm:()=>{
            DB.historialOcultos.push(...ids);
            Toast.show('Bloque quitado del historial');
            this.render();
            Bus.emit();
          }
        });
      });
    });
    el.querySelectorAll('[data-action="del-evento"]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const id = e.currentTarget.dataset.eventoId;
        DB.historialOcultos.push(id);
        Toast.show('Registro quitado del historial');
        this.render();
        Bus.emit();
      });
    });
    el.querySelectorAll('[data-toggle]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const targetId = e.currentTarget.dataset.toggle;
        const row = document.getElementById(targetId);
        if(row) row.style.display = row.style.display === 'none' ? '' : 'none';
      });
    });
  }
};

Router.renderers.historial = () => ViewHistorial.render();



/* =======================================================================
   auth.js — login con usuario/contraseña + arranque controlado de la app
   ======================================================================= */

let _appIniciada = false;

function usuarioToEmail(usuario){
  return usuario.trim().toLowerCase().replace(/\s+/g,'') + '@' + AUTH_EMAIL_DOMAIN;
}

function mostrarLogin(){
  document.getElementById('loginScreen').classList.remove('hidden');
}
function ocultarLogin(){
  document.getElementById('loginScreen').classList.add('hidden');
}

function iniciarApp(user){
  if(_appIniciada) return;
  _appIniciada = true;
  document.getElementById('whoUser').textContent = user.email.replace('@'+AUTH_EMAIL_DOMAIN,'');
  iniciarSincronizacion();
  Router.init();
}

function cerrarApp(){
  _appIniciada = false;
  detenerSincronizacion();
}

fbAuth.onAuthStateChanged(user=>{
  if(user){
    ocultarLogin();
    iniciarApp(user);
  } else {
    cerrarApp();
    mostrarLogin();
  }
});

document.getElementById('loginForm').addEventListener('submit', (e)=>{
  e.preventDefault();
  const usuario = document.getElementById('loginUser').value;
  const pass = document.getElementById('loginPass').value;
  const errorBox = document.getElementById('loginError');
  const loadingBox = document.getElementById('loginLoading');
  errorBox.classList.remove('show');
  loadingBox.classList.add('show');

  fbAuth.signInWithEmailAndPassword(usuarioToEmail(usuario), pass)
    .catch(err=>{
      let msg = 'No se pudo iniciar sesión. Revisá usuario y contraseña.';
      if(err.code === 'auth/too-many-requests') msg = 'Demasiados intentos. Esperá unos minutos y volvé a intentar.';
      if(err.code === 'auth/network-request-failed') msg = 'Sin conexión a internet.';
      errorBox.textContent = msg;
      errorBox.classList.add('show');
    })
    .finally(()=>{
      loadingBox.classList.remove('show');
    });
});

document.getElementById('btnLogout').addEventListener('click', ()=>{
  fbAuth.signOut();
});
</script>
